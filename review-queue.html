<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="robots" content="noindex, nofollow"/>
  <meta charset="utf-8"/>
  <title>NIPC | Review Queue -- Davis</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <link href="images/favicon.png" rel="shortcut icon" type="image/x-icon"/>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    @view-transition { navigation: auto; }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      background-color: rgb(243, 240, 237);
      color: rgb(40, 36, 36);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background-color 500ms ease;
    }

    /* ── Back Link ── */
    .back-link {
      position: fixed;
      top: 20px;
      left: 24px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgb(40, 36, 36);
      text-decoration: none;
      opacity: 0.5;
      transition: opacity 200ms ease;
      z-index: 100;
    }

    .back-link:hover {
      opacity: 1;
    }

    /* ── Container ── */
    .queue-container {
      max-width: 720px;
      margin: 0 auto;
      padding: 80px 20px 60px;
    }

    /* ── Header ── */
    .queue-header {
      text-align: center;
      margin-bottom: 12px;
    }

    .queue-title {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgb(40, 36, 36);
      margin-bottom: 12px;
    }

    .queue-summary {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: rgb(40, 36, 36);
      opacity: 0.6;
    }

    .queue-summary .sep {
      margin: 0 6px;
      opacity: 0.4;
    }

    /* ── Section Headers ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-top: 36px;
      padding-bottom: 10px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: rgb(209, 204, 199);
    }

    .section-count {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.05em;
      opacity: 0.5;
      flex-shrink: 0;
    }

    /* ── Asset Row ── */
    .asset-row {
      display: flex;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid rgb(209, 204, 199);
    }

    /* ── Staggered entrance ── */
    .asset-row.stagger-hidden {
      opacity: 0;
      transform: translateY(8px);
    }

    .asset-row.stagger-in {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 350ms ease, transform 350ms cubic-bezier(0.4,0,0.2,1);
    }

    .section-header.stagger-hidden {
      opacity: 0;
    }

    .section-header.stagger-in {
      opacity: 1;
      transition: opacity 300ms ease;
    }

    .asset-link {
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      color: inherit;
      flex: 1;
      min-width: 0;
      transition: opacity 150ms ease;
    }

    .asset-link:hover {
      opacity: 0.7;
    }

    /* ── Thumbnail ── */
    .asset-thumb {
      width: 120px;
      height: 68px;
      background: rgb(30, 28, 28);
      border: 1px solid rgb(209, 204, 199);
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
    }

    .asset-thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Asset Info ── */
    .asset-info {
      min-width: 0;
    }

    .asset-title {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .asset-meta {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.03em;
      opacity: 0.5;
      display: flex;
      align-items: center;
      gap: 0;
      flex-wrap: wrap;
    }

    .asset-meta .dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgb(40, 36, 36);
      opacity: 0.4;
      margin: 0 8px;
      flex-shrink: 0;
    }

    /* ── Status Button ── */
    .status-btn-wrap {
      position: relative;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .asset-row {
      position: relative;
      z-index: 0;
    }

    .asset-row.dropdown-open {
      z-index: 100;
    }

    .status-btn {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: none;
      border: 1px solid rgb(209, 204, 199);
      padding: 6px 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: rgb(40, 36, 36);
      white-space: nowrap;
      min-width: 103px;
      transition: border-color 200ms ease, background 200ms ease;
    }

    .status-btn:hover {
      border-color: rgb(40, 36, 36);
      background: rgba(40, 36, 36, 0.04);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.needs_review { background: rgb(220, 40, 40); }
    .status-dot.in_review { background: rgb(220, 170, 40); }
    .status-dot.approved { background: rgb(60, 160, 80); }
    .status-dot.archived { background: rgb(160, 155, 150); }

    /* ── Download Button ── */
    .download-btn {
      flex-shrink: 0;
      margin-left: 8px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      opacity: 0.25;
      transition: opacity 200ms ease;
      display: flex;
      align-items: center;
    }

    .download-btn:hover {
      opacity: 0.7;
    }

    .download-btn svg {
      width: 11px;
      height: 11px;
    }

    /* ── Archive Toggle ── */
    .archive-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-top: 32px;
      padding-bottom: 8px;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }

    .archive-toggle:hover .archive-label {
      opacity: 0.7;
    }

    .archive-label {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgb(40, 36, 36);
      opacity: 0.4;
      transition: opacity 200ms ease;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .archive-chevron {
      display: inline-block;
      transition: transform 300ms cubic-bezier(0.4,0,0.2,1);
      font-size: 8px;
      line-height: 1;
    }

    .archive-chevron.open {
      transform: rotate(90deg);
    }

    .archive-line {
      flex: 1;
      height: 1px;
      background: rgb(209, 204, 199);
      opacity: 0.5;
    }

    .archive-list {
      overflow: hidden;
      height: 0;
      transition: height 320ms cubic-bezier(0.4,0,0.2,1);
    }

    .archive-list.open {
      height: auto;
    }

    /* ── Status Dropdown ── */
    .status-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      left: 0;
      background: rgb(243, 240, 237);
      border: 1px solid rgb(209, 204, 199);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      z-index: 50;
      display: none;
      overflow: hidden;
    }

    .status-dropdown.open {
      display: block;
    }

    .status-option {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgb(40, 36, 36);
      transition: background 150ms ease;
      white-space: nowrap;
    }

    .status-option:hover {
      background: rgba(40, 36, 36, 0.06);
    }

    .status-option.current {
      font-weight: 500;
      background: rgba(40, 36, 36, 0.04);
    }

    /* ── Section colors ── */
    .section-label.needs_review { color: rgb(220, 40, 40); }
    .section-label.in_review { color: rgb(220, 170, 40); }
    .section-label.approved { color: rgb(60, 160, 80); }
    .section-label.archived { color: rgb(160, 155, 150); }

    /* ── Section wrapper ── */
    .section-group {
    }

    /* ── Page transition ── */
    .page-content {
      opacity: 0;
      transition: opacity 500ms ease;
    }

    .page-content.visible {
      opacity: 1;
    }

    /* ── Mobile: Card Layout ── */
    @media (max-width: 600px) {
      .queue-container {
        padding: 72px 16px 40px;
      }

      .asset-row {
        display: grid;
        grid-template-columns: 1fr auto;
        border-bottom: none;
        border: 1px solid rgb(209, 204, 199);
        margin-bottom: 12px;
        padding: 0;
        overflow: hidden;
      }

      .asset-link {
        display: contents;
      }

      .asset-info {
        display: contents;
      }

      .asset-title {
        grid-column: 1;
        grid-row: 1;
        padding: 10px 0 10px 12px;
        margin-bottom: 0;
        font-size: 12px;
        align-self: center;
      }

      .status-btn-wrap {
        grid-column: 2;
        grid-row: 1;
        margin-left: 8px;
        margin-right: 12px;
        align-self: center;
      }

      .asset-thumb {
        grid-column: 1 / -1;
        grid-row: 2;
        width: 100%;
        height: 180px;
        border: none;
        border-top: 1px solid rgb(209, 204, 199);
        border-bottom: 1px solid rgb(209, 204, 199);
      }

      .asset-meta {
        grid-column: 1 / -1;
        grid-row: 3;
        padding: 10px 12px;
      }

      .status-dropdown {
        right: 0;
      }

      /* Bump interactive sizes so taps land on something. */
      .status-btn {
        font-size: 11px;
        padding: 10px 12px;
        min-width: 116px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
      }

      .status-option {
        font-size: 11px;
        padding: 12px 14px;
      }

      .download-btn {
        padding: 10px;
      }

      .download-btn svg {
        width: 18px;
        height: 18px;
      }

      .archive-label {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>

  <div class="page-content" id="page-content">
  <a href="/clients/rooms" class="back-link" id="back-link">&larr; Back</a>

  <div class="queue-container">
    <div class="queue-header">
      <div class="queue-title">Davis -- Review Queue</div>
      <div class="queue-summary" id="summary"></div>
    </div>

    <div id="sections"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ── Data (loaded from API) ──
    var assets = [];
    var currentProjectId = null;
    var authToken = null;

    async function initAuth() {
      var sb = window.supabase.createClient(
        'https://qnaqxnrbsvushgfwnjnd.supabase.co',
        'sb_publishable_-aYfVQUgQrh7vwczlGi3pw_MCEC8fXY'
      );
      var result = await sb.auth.getSession();
      if (!result.data.session) {
        window.location.href = '/clients';
        return null;
      }
      authToken = result.data.session.access_token;
      return authToken;
    }

    async function loadReviewAssets() {
      var params = new URLSearchParams(window.location.search);
      currentProjectId = params.get('project');

      if (!currentProjectId) {
        document.getElementById('sections').innerHTML =
          '<div style="padding:60px 0;text-align:center;color:rgba(255,255,255,0.4);font-size:12px;letter-spacing:0.1em;">No project selected. <a href="/clients/rooms" style="color:inherit;text-decoration:underline">Return to the dashboard</a> and pick a project.</div>';
        return;
      }

      var res = await fetch('/api/projects/' + currentProjectId + '/reviews', {
        headers: { 'Authorization': 'Bearer ' + authToken }
      });

      if (!res.ok) {
        console.error('Failed to load reviews:', res.status);
        document.getElementById('sections').innerHTML =
          '<div style="padding:60px 0;text-align:center;color:rgba(255,255,255,0.4);font-size:12px;letter-spacing:0.1em;">Could not load review assets for this project.</div>';
        return;
      }

      var data = await res.json();
      assets = data.assets.map(function(a) {
        var frameioUrl = a.frameio_review_url || null;
        return {
          id: a.id,
          title: a.title,
          date: a.date,
          version: a.version,
          notes: a.notes,
          status: a.status,
          url: frameioUrl || ('review-mux.html?asset=' + a.id + '&project=' + currentProjectId),
          frameioUrl: frameioUrl,
          frameioAssetId: a.frameio_asset_id || null,
          frameioThumbUrl: a.frameio_thumb_url || null,
          thumbTime: a.thumb_time || 0
        };
      });

      // Update project title
      var titleEl = document.querySelector('.queue-title');
      if (titleEl && assets.length > 0) {
        // Extract project name from first asset title (before " -- ")
        var projName = assets[0].title.split(' -- ')[0] || 'Review Queue';
        titleEl.textContent = projName + ' -- Review Queue';
      }

      renderSections();
      hideAllRows();
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          pageContent.classList.add('visible');
          setTimeout(staggerEntrance, 200);
        });
      });
    }

    async function updateStatusOnServer(assetId, newStatus) {
      await fetch('/api/projects/' + currentProjectId + '/reviews', {
        method: 'PATCH',
        headers: {
          'Authorization': 'Bearer ' + authToken,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ assetId: assetId, status: newStatus })
      });
    }

    const statusLabels = {
      needs_review: 'Needs Review',
      in_review: 'In Review',
      approved: 'Approved',
      archived: 'Archived'
    };

    const sectionOrder = ['needs_review', 'in_review', 'approved'];
    const allStatuses = ['needs_review', 'in_review', 'approved', 'archived'];

    let openDropdown = null;

    function getStatusCounts() {
      const counts = { needs_review: 0, in_review: 0, approved: 0, archived: 0 };
      assets.forEach(a => counts[a.status]++);
      return counts;
    }

    function updateSummary() {
      const c = getStatusCounts();
      var parts = c.needs_review + ' needs review' +
        '<span class="sep">/</span>' +
        c.in_review + ' in review' +
        '<span class="sep">/</span>' +
        c.approved + ' approved';
      if (c.archived > 0) {
        parts += '<span class="sep">/</span>' + c.archived + ' archived';
      }
      document.getElementById('summary').innerHTML = parts;
    }

    function buildRow(asset) {
      const row = document.createElement('div');
      row.className = 'asset-row';
      row.dataset.id = asset.id;

      const noteLabel = asset.notes === 1 ? '1 note' : asset.notes + ' notes';

      var dlSvg = '<svg viewBox="0 0 12 12" fill="none" stroke="rgb(40,36,36)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 1.5v7"/><path d="M3 6.5l3 3 3-3"/><path d="M2 10.5h8"/></svg>';

      // Use Frame.io's thumbnail whenever one is provided — that covers videos,
      // JPEGs, TIFFs, and anything else Frame.io can preview. Fall back to the
      // NIPC acronym mark only when there's no thumb URL at all. The acronym
      // reads at thumbnail size; the four-line wordmark we tried first was
      // illegible at 120x68.
      var thumbHtml = asset.frameioThumbUrl
        ? '<img src="' + asset.frameioThumbUrl + '" alt="" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;"/>'
        : '<img src="images/nipc-acronym.png" alt="NIPC" loading="lazy" style="width:100%;height:100%;object-fit:contain;display:block;background:rgb(243,240,237);"/>';

      var linkAttrs = asset.frameioUrl
        ? ' target="_blank" rel="noopener" data-external="1"'
        : '';

      // Frame.io-linked rows: status is read-only mirror. Render as a
      // non-interactive button with a tooltip; no dropdown.
      var statusBlock;
      if (asset.frameioAssetId) {
        statusBlock =
          '<div class="status-btn-wrap" data-frameio="1" title="Status is managed in Frame.io">' +
            '<button class="status-btn" data-id="' + asset.id + '" disabled style="cursor:default;opacity:0.85">' +
              '<span class="status-dot ' + asset.status + '"></span>' +
              '<span>' + statusLabels[asset.status] + '</span>' +
            '</button>' +
          '</div>';
      } else {
        statusBlock =
          '<div class="status-btn-wrap">' +
            '<button class="status-btn" data-id="' + asset.id + '">' +
              '<span class="status-dot ' + asset.status + '"></span>' +
              '<span>' + statusLabels[asset.status] + '</span>' +
            '</button>' +
            '<div class="status-dropdown" data-id="' + asset.id + '">' +
              allStatuses.map(function(s) {
                return '<div class="status-option' + (s === asset.status ? ' current' : '') + '" data-status="' + s + '" data-id="' + asset.id + '">' +
                  '<span class="status-dot ' + s + '"></span>' +
                  '<span>' + statusLabels[s] + '</span>' +
                '</div>';
              }).join('') +
            '</div>' +
          '</div>';
      }

      row.innerHTML =
        '<a href="' + asset.url + '" class="asset-link"' + linkAttrs + '>' +
          '<div class="asset-thumb">' + thumbHtml + '</div>' +
          '<div class="asset-info">' +
            '<div class="asset-title">' + asset.title + '</div>' +
            '<div class="asset-meta">' +
              '<span>' + asset.date + '</span>' +
              '<span class="dot"></span>' +
              '<span>' + asset.version + '</span>' +
              '<span class="dot"></span>' +
              '<span>' + noteLabel + '</span>' +
            '</div>' +
          '</div>' +
        '</a>' +
        statusBlock +
        '<button class="download-btn" data-id="' + asset.id + '" title="Download">' + dlSvg + '</button>';

      return row;
    }

    var archiveOpen = false;

    function renderSections() {
      const container = document.getElementById('sections');
      container.innerHTML = '';

      sectionOrder.forEach(function(status) {
        const sectionAssets = assets.filter(function(a) { return a.status === status; });
        if (sectionAssets.length === 0) return;

        const group = document.createElement('div');
        group.className = 'section-group';
        group.dataset.section = status;

        const header = document.createElement('div');
        header.className = 'section-header';
        header.innerHTML =
          '<span class="section-label ' + status + '">' + statusLabels[status] + '</span>' +
          '<span class="section-line"></span>' +
          '<span class="section-count">' + sectionAssets.length + '</span>';

        group.appendChild(header);

        const list = document.createElement('div');
        list.className = 'section-list';
        list.dataset.section = status;

        sectionAssets.forEach(function(asset) {
          list.appendChild(buildRow(asset));
        });

        group.appendChild(list);
        container.appendChild(group);
      });

      renderArchive(container);
      updateSummary();
    }

    function hideAllRows() {
      var items = document.querySelectorAll('#sections .section-header, #sections .section-list > .asset-row');
      items.forEach(function(el) {
        el.classList.add('stagger-hidden');
      });
    }

    function staggerEntrance() {
      var items = document.querySelectorAll('#sections .stagger-hidden');
      var delay = 80;
      items.forEach(function(el, i) {
        setTimeout(function() {
          el.classList.remove('stagger-hidden');
          el.classList.add('stagger-in');
        }, i * delay);
      });
    }

    function renderArchive(container) {
      var archivedAssets = assets.filter(function(a) { return a.status === 'archived'; });

      // Remove old archive DOM
      var oldToggle = container.querySelector('.archive-toggle');
      var oldGroup = container.querySelector('.section-group[data-section="archived"]');
      if (oldToggle) oldToggle.remove();
      if (oldGroup) oldGroup.remove();

      if (archivedAssets.length === 0) return;

      var toggle = document.createElement('div');
      toggle.className = 'archive-toggle';
      toggle.innerHTML =
        '<span class="archive-label">' +
          '<span class="archive-chevron' + (archiveOpen ? ' open' : '') + '">&#9654;</span>' +
          'Archive (' + archivedAssets.length + ')' +
        '</span>' +
        '<span class="archive-line"></span>';
      container.appendChild(toggle);

      var group = document.createElement('div');
      group.className = 'section-group';
      group.dataset.section = 'archived';

      var list = document.createElement('div');
      list.className = 'archive-list' + (archiveOpen ? ' open' : '');
      list.dataset.section = 'archived';

      archivedAssets.forEach(function(asset) {
        list.appendChild(buildRow(asset));
      });

      group.appendChild(list);
      container.appendChild(group);

      // Set initial height if open
      if (archiveOpen) {
        list.style.height = 'auto';
      }

      toggle.addEventListener('click', function() {
        archiveOpen = !archiveOpen;
        var chevron = toggle.querySelector('.archive-chevron');
        chevron.classList.toggle('open', archiveOpen);
        if (archiveOpen) {
          list.classList.add('open');
          list.style.height = '0';
          list.offsetHeight;
          var h = list.scrollHeight;
          list.style.height = h + 'px';
          setTimeout(function() { list.style.height = 'auto'; }, 320);
        } else {
          list.style.height = list.scrollHeight + 'px';
          list.offsetHeight;
          list.style.height = '0';
          setTimeout(function() { list.classList.remove('open'); }, 320);
        }
      });
    }

    function closeAllDropdowns() {
      if (openDropdown) {
        openDropdown.classList.remove('open');
        var row = openDropdown.closest('.asset-row');
        if (row) row.classList.remove('dropdown-open');
        openDropdown = null;
      }
    }

    var animating = false;
    var ease = 'cubic-bezier(0.4,0,0.2,1)';

    // ── Slide an element's height to 0, then remove it ──
    function slideUp(el, duration, callback) {
      var h = el.offsetHeight;
      el.style.overflow = 'hidden';
      el.style.height = h + 'px';
      el.offsetHeight;
      el.style.transition = ['height','padding-top','padding-bottom','border-bottom-width']
        .map(function(p) { return p + ' ' + duration + 'ms ' + ease; }).join(', ');
      el.style.height = '0';
      el.style.paddingTop = '0';
      el.style.paddingBottom = '0';
      el.style.borderBottomWidth = '0';
      setTimeout(function() { el.remove(); if (callback) callback(); }, duration);
    }

    // ── Expand an element from height 0 to natural ──
    function slideDown(el, duration, callback) {
      el.style.overflow = 'hidden';
      var h = el.offsetHeight;
      var cs = getComputedStyle(el);
      var pt = cs.paddingTop, pb = cs.paddingBottom, bbw = cs.borderBottomWidth;
      el.style.height = '0';
      el.style.paddingTop = '0';
      el.style.paddingBottom = '0';
      el.style.borderBottomWidth = '0';
      el.style.opacity = '0';
      el.offsetHeight;
      el.style.transition = ['height','padding-top','padding-bottom','border-bottom-width']
        .map(function(p) { return p + ' ' + duration + 'ms ' + ease; }).join(', ')
        + ', opacity ' + Math.round(duration * 0.6) + 'ms ease ' + Math.round(duration * 0.3) + 'ms';
      el.style.height = h + 'px';
      el.style.paddingTop = pt;
      el.style.paddingBottom = pb;
      el.style.borderBottomWidth = bbw;
      el.style.opacity = '1';
      setTimeout(function() { el.removeAttribute('style'); if (callback) callback(); }, duration + 20);
    }

    // ── Create a section-group DOM element ──
    function createSectionDOM(status) {
      var group = document.createElement('div');
      group.className = 'section-group';
      group.dataset.section = status;
      var header = document.createElement('div');
      header.className = 'section-header';
      header.innerHTML =
        '<span class="section-label ' + status + '">' + statusLabels[status] + '</span>' +
        '<span class="section-line"></span>' +
        '<span class="section-count">0</span>';
      group.appendChild(header);
      var list = document.createElement('div');
      list.className = 'section-list';
      list.dataset.section = status;
      group.appendChild(list);
      return group;
    }

    // ── Insert a section-group in the correct order ──
    function insertSectionInOrder(group) {
      var container = document.getElementById('sections');
      var newIdx = sectionOrder.indexOf(group.dataset.section);
      var existing = container.querySelectorAll('.section-group');
      var before = null;
      for (var i = 0; i < existing.length; i++) {
        if (sectionOrder.indexOf(existing[i].dataset.section) > newIdx) {
          before = existing[i];
          break;
        }
      }
      if (before) container.insertBefore(group, before);
      else container.appendChild(group);
    }

    function changeStatus(assetId, newStatus) {
      if (animating) return;
      var asset = assets.find(function(a) { return a.id === assetId; });
      if (!asset || asset.status === newStatus) return;
      animating = true;

      // Persist to server
      updateStatusOnServer(assetId, newStatus);

      var oldStatus = asset.status;
      var row = document.querySelector('.asset-row[data-id="' + assetId + '"]');
      if (!row) { animating = false; return; }

      var oldGroup = row.closest('.section-group');
      var isFromArchive = oldStatus === 'archived';
      var willOldBeEmpty = assets.filter(function(a) { return a.status === oldStatus; }).length === 1;

      // Phase 1: Fade out row content
      row.style.transition = 'opacity 200ms ease, transform 200ms ease';
      row.style.opacity = '0';
      row.style.transform = 'translateX(-6px)';

      setTimeout(function() {
        // Phase 2: Collapse row height
        slideUp(row, 250, function() {
          asset.status = newStatus;
          updateSummary();

          if (isFromArchive) {
            // Re-render archive to remove the item
            renderArchive(document.getElementById('sections'));
            enterTarget(asset, newStatus, oldStatus);
          } else if (willOldBeEmpty && oldGroup) {
            // Phase 3a: Collapse empty section
            slideUp(oldGroup, 260, function() {
              enterTarget(asset, newStatus, oldStatus);
            });
          } else {
            // Phase 3b: Update old section count
            if (oldGroup) {
              oldGroup.querySelector('.section-count').textContent =
                assets.filter(function(a) { return a.status === oldStatus; }).length;
            }
            enterTarget(asset, newStatus, oldStatus);
          }
        });
      }, 210);

      function enterTarget(asset, newStatus) {
        if (newStatus === 'archived') {
          // Re-render archive section and finish
          renderArchive(document.getElementById('sections'));
          if (!archiveOpen) {
            // Auto-open archive to show the newly archived item
            var toggle = document.querySelector('.archive-toggle');
            if (toggle) toggle.click();
          }
          animating = false;
          return;
        }

        var targetGroup = document.querySelector('.section-group[data-section="' + newStatus + '"]');
        var isNew = !targetGroup;
        if (!targetGroup) {
          targetGroup = createSectionDOM(newStatus);
        }
        var newRow = buildRow(asset);
        targetGroup.querySelector('.section-list').appendChild(newRow);
        targetGroup.querySelector('.section-count').textContent =
          assets.filter(function(a) { return a.status === newStatus; }).length;

        // Re-render archive in case count changed
        renderArchive(document.getElementById('sections'));

        if (isNew) {
          insertSectionInOrder(targetGroup);
          slideDown(targetGroup, 320, function() { animating = false; });
        } else {
          slideDown(newRow, 280, function() { animating = false; });
        }
      }
    }

    // ── Event Delegation ──
    document.addEventListener('click', function(e) {
      // Download button — fetches a fresh signed URL from Frame.io and
      // navigates the browser to it. Frame.io serves the file with
      // Content-Disposition: attachment so the browser triggers a download.
      var dlBtn = e.target.closest('.download-btn');
      if (dlBtn) {
        e.preventDefault();
        e.stopPropagation();
        var dlId = dlBtn.dataset.id;
        if (dlBtn.disabled) return;
        dlBtn.disabled = true;
        fetch('/api/reviews/' + encodeURIComponent(dlId) + '/download', {
          headers: { 'Authorization': 'Bearer ' + authToken }
        }).then(function(r) {
          if (!r.ok) throw new Error('Download request failed: ' + r.status);
          return r.json();
        }).then(function(data) {
          if (!data || !data.url) throw new Error('No URL in response');
          window.location.href = data.url;
        }).catch(function(err) {
          console.error('Download failed:', err);
          alert('Could not start download. Try again or open the asset in Frame.io.');
        }).finally(function() {
          dlBtn.disabled = false;
        });
        return;
      }

      // Status button toggle
      const btn = e.target.closest('.status-btn');
      if (btn) {
        e.preventDefault();
        e.stopPropagation();
        const dropdown = btn.nextElementSibling;
        if (openDropdown && openDropdown !== dropdown) {
          closeAllDropdowns();
        }
        if (dropdown.classList.contains('open')) {
          closeAllDropdowns();
        } else {
          dropdown.classList.add('open');
          var parentRow = dropdown.closest('.asset-row');
          if (parentRow) parentRow.classList.add('dropdown-open');
          openDropdown = dropdown;
        }
        return;
      }

      // Status option select
      const option = e.target.closest('.status-option');
      if (option) {
        e.preventDefault();
        e.stopPropagation();
        const assetId = option.dataset.id;
        const newStatus = option.dataset.status;
        closeAllDropdowns();
        changeStatus(assetId, newStatus);
        return;
      }

      // Close dropdown on outside click
      closeAllDropdowns();
    });

    // ── Init ──
    var pageContent = document.getElementById('page-content');

    // Back button: fade out content, transition bg, then navigate
    document.getElementById('back-link').addEventListener('click', function(e) {
      e.preventDefault();
      pageContent.classList.remove('visible');
      setTimeout(function() {
        document.body.style.backgroundColor = 'rgb(220, 40, 40)';
        setTimeout(function() {
          window.location.href = '/clients/rooms';
        }, 500);
      }, 500);
    });

    // Asset links: fade out, then navigate to review player. External
    // (Frame.io) links open in a new tab — let the browser handle them.
    document.addEventListener('click', function(e) {
      var link = e.target.closest('.asset-link');
      if (!link) return;
      if (link.getAttribute('data-external') === '1') return; // new-tab nav
      e.preventDefault();
      var href = link.getAttribute('href');
      pageContent.classList.remove('visible');
      setTimeout(function() {
        window.location.href = href;
      }, 500);
    }, true);

    // Authenticate and load data
    initAuth().then(function(token) {
      if (token) loadReviewAssets();
    });
  </script>
  </div>
</body>
</html>
