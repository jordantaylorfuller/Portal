<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>NIPC | New International Picture Company - Carla Luffe, Post-Production Studio NYC</title>
  <meta content="New International Picture Company (NIPC), led by editor Carla Luffe, is a post-production studio in New York specializing in editorial, color grading, and motion graphics for brands, agencies, and entertainment studios." name="description"/>
  <meta content="NIPC | New International Picture Company - Coming Soon" property="og:title"/>
  <meta content="New International Picture Company (NIPC), founded by editor Carla Luffe. Post-production studio in New York specializing in editorial, color, and sound." property="og:description"/>
  <meta content="images/nipc-logo.png" property="og:image"/>
  <meta content="NIPC | New International Picture Company - Coming Soon" property="twitter:title"/>
  <meta content="New International Picture Company (NIPC), founded by editor Carla Luffe. Post-production studio in New York specializing in editorial, color, and sound." property="twitter:description"/>
  <meta property="og:type" content="website"/>
  <meta content="summary_large_image" name="twitter:card"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <link href="images/favicon.png" rel="shortcut icon" type="image/x-icon"/>
  <link href="images/webclip.png" rel="apple-touch-icon"/>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "New International Picture Company",
    "alternateName": "NIPC",
    "url": "https://www.nipc.tv",
    "email": "hi@nipc.tv",
    "founder": {
      "@type": "Person",
      "name": "Carla Luffe",
      "jobTitle": "Editor"
    },
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "39 Great Jones Street #1",
      "addressLocality": "New York",
      "addressRegion": "NY",
      "postalCode": "10012",
      "addressCountry": "US"
    },
    "sameAs": [
      "https://www.instagram.com/nipc.tv",
      "https://www.linkedin.com/company/nipc-tv/"
    ],
    "description": "Post-production studio led by editor Carla Luffe, specializing in editorial, motion graphics, and color grading for brands, agencies, and entertainment studios."
  }
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: rgb(220, 40, 40);
      color: rgb(40, 36, 36);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Login Screen (sits behind landing page) ── */
    .login-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgb(220, 40, 40);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1;
      transition: background-color 700ms ease;
    }

    .login-screen.session-entering {
      background-color: rgb(243, 240, 237);
    }

    .back-link {
      position: fixed;
      top: 20px;
      left: 24px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      transition: color 0.5s ease;
      z-index: 5;
    }

    .back-link.dark {
      color: rgba(40, 36, 36, 0.45);
    }

    .back-link.dark:hover {
      color: rgba(40, 36, 36, 0.8);
    }

    .back-link:hover {
      color: rgba(255, 255, 255, 0.9);
    }

    .login-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 320px;
      padding: 0 32px;
      transition: opacity 500ms ease;
    }

    .login-form.faded {
      opacity: 0;
      pointer-events: none;
    }

    /* ── Room Selection ── */
    .room-selection {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 500ms ease 300ms;
    }

    .room-welcome {
      position: absolute;
      top: calc(50% / 2);
      transform: translateY(-50%);
      font-family: 'DM Mono', monospace;
      font-size: 24px;
      font-weight: 400;
      text-transform: uppercase;
      color: #fff;
      transition: opacity 500ms ease;
    }

    .room-welcome.faded {
      opacity: 0;
    }

    .room-selection.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .room-btn {
      display: inline-block;
      width: 200px;
      padding: 12px 32px;
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      font-weight: 400;
      text-transform: uppercase;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 0;
      background: transparent;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.25s ease, background-color 0.25s ease, opacity 500ms ease;
    }

    .room-selection.buttons-faded .room-btn {
      opacity: 0;
      pointer-events: none;
    }

    .room-btn:hover {
      border-color: rgba(255, 255, 255, 0.9);
      background-color: rgba(255, 255, 255, 0.08);
    }

    .room-btn:active {
      background-color: rgba(255, 255, 255, 0.14);
    }

    /* ── Session Waiting Screen ── */
    .session-waiting {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 600ms ease;
    }

    .session-waiting.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .session-message {
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgb(40, 36, 36);
    }

    .session-timer {
      font-family: 'DM Mono', monospace;
      font-size: 48px;
      font-weight: 300;
      color: rgb(40, 36, 36);
      letter-spacing: 0.05em;
    }

    .login-heading {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #fff;
      margin-bottom: 48px;
    }

    .login-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.4);
      padding: 12px 0;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: #fff;
      outline: none;
      margin-bottom: 24px;
      transition: border-color 0.2s ease;
    }

    .login-input::placeholder {
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.05em;
    }

    .login-input:focus {
      border-bottom-color: rgba(255, 255, 255, 0.8);
    }

    .login-btn {
      margin-top: 16px;
      display: inline-block;
      width: 200px;
      padding: 12px 32px;
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      font-weight: 400;
      text-transform: uppercase;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 0;
      background: transparent;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.25s ease, background-color 0.25s ease;
    }

    .login-btn:hover {
      border-color: rgba(255, 255, 255, 0.9);
      background-color: rgba(255, 255, 255, 0.08);
    }

    .login-btn:active {
      background-color: rgba(255, 255, 255, 0.14);
    }

    /* ── Landing Page Overlay ── */
    .landing-page {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgb(243, 240, 237);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transform: translateX(0);
      box-shadow: 20px 0 60px rgba(0, 0, 0, 0.4), 8px 0 20px rgba(0, 0, 0, 0.2);
      transition: transform 700ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    .landing-page.slid {
      transform: translateX(calc(-100% - 80px));
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .heading {
      font-family: 'DM Mono', serif;
      font-size: 24px;
      font-weight: 400;
      line-height: 26.4px;
      text-transform: uppercase;
      color: rgb(40, 36, 36);
      padding: 0 32px;
      margin: 0 0 16px;
    }

    .subheading {
      font-family: 'DM Mono', serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 22.4px;
      text-transform: uppercase;
      color: rgb(40, 36, 36);
      padding: 0 32px;
      margin: 0 0 32px;
    }

    .btn {
      display: inline-block;
      width: 200px;
      padding: 12px 32px;
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      font-weight: 400;
      text-transform: uppercase;
      color: rgb(220, 40, 40);
      border: 1px solid rgb(209, 204, 199);
      border-radius: 0;
      background: transparent;
      text-decoration: none;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.25s ease, background-color 0.25s ease;
    }

    .btn:hover {
      border-color: rgb(170, 165, 160);
      background-color: rgba(0, 0, 0, 0.03);
    }

    .btn:active {
      background-color: rgba(0, 0, 0, 0.06);
    }

    .btn + .btn {
      margin-top: 12px;
    }

    .portal-link {
      position: fixed;
      top: 20px;
      right: 24px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgb(40, 36, 36);
      text-decoration: none;
      opacity: 0.45;
      transition: opacity 0.2s ease;
    }

    .portal-link:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <!-- Login screen (behind) -->
  <div class="login-screen">
    <a href="#" class="back-link">&#8592; Back</a>
    <form class="login-form" onsubmit="return false;">
      <h2 class="login-heading">Client Portal</h2>
      <input type="email" class="login-input" placeholder="Email" autocomplete="email"/>
      <input type="password" class="login-input" placeholder="Password" autocomplete="current-password"/>
      <button type="submit" class="login-btn">Login</button>
    </form>
    <div class="room-selection">
      <div class="room-welcome">Welcome Back, Jordan.</div>
      <button class="room-btn">Review Room</button>
      <button class="room-btn">Session Room</button>
      <button class="room-btn">Delivery Room</button>
    </div>
    <div class="session-waiting">
      <div class="session-message">The session will start shortly.</div>
      <div class="session-timer">05:00</div>
    </div>
  </div>

  <!-- Landing page overlay (slides left to reveal login) -->
  <div class="landing-page">
    <a href="#" class="portal-link">Client Portal</a>
    <div class="container">
      <h1 class="heading">While we're busy building a<br/><span>new international picture company</span>,<br/>feel free to play around with our logo.</h1>
      <h2 class="subheading">Sound on, please.</h2>
      <a href="#" class="btn">Play</a>
    </div>
  </div>

  <script>
    const landingPage = document.querySelector('.landing-page');
    const portalLink = document.querySelector('.portal-link');
    const backLink = document.querySelector('.back-link');
    const loginForm = document.querySelector('.login-form');
    const roomSelection = document.querySelector('.room-selection');
    const loginBtn = document.querySelector('.login-btn');
    const loginScreen = document.querySelector('.login-screen');
    const roomWelcome = document.querySelector('.room-welcome');
    const sessionBtn = document.querySelectorAll('.room-btn')[1];
    const sessionWaiting = document.querySelector('.session-waiting');
    const sessionTimer = document.querySelector('.session-timer');

    portalLink.addEventListener('click', function(e) {
      e.preventDefault();
      landingPage.classList.add('slid');
    });

    loginBtn.addEventListener('click', function(e) {
      e.preventDefault();
      loginForm.classList.add('faded');
      roomSelection.classList.add('visible');
    });

    var countdownInterval = null;

    sessionBtn.addEventListener('click', function(e) {
      e.preventDefault();
      roomWelcome.classList.add('faded');
      roomSelection.classList.add('buttons-faded');
      loginScreen.classList.add('session-entering');
      backLink.classList.add('dark');

      setTimeout(function() {
        sessionWaiting.classList.add('visible');
        startCountdown(5 * 60);
      }, 700);
    });

    function startCountdown(seconds) {
      var remaining = seconds;
      updateTimerDisplay(remaining);
      countdownInterval = setInterval(function() {
        remaining--;
        updateTimerDisplay(remaining);
        if (remaining <= 0) {
          clearInterval(countdownInterval);
          countdownInterval = null;
        }
      }, 1000);
    }

    function updateTimerDisplay(seconds) {
      var m = Math.floor(seconds / 60);
      var s = seconds % 60;
      sessionTimer.textContent =
        String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

    backLink.addEventListener('click', function(e) {
      e.preventDefault();
      if (roomSelection.classList.contains('visible')) {
        roomSelection.classList.remove('visible');
        loginForm.classList.remove('faded');
      } else {
        landingPage.classList.remove('slid');
      }
    });
  </script>

</body>
</html>
