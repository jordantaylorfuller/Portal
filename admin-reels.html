<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="robots" content="noindex, nofollow"/>
  <meta charset="utf-8"/>
  <title>NIPC | Reels Admin</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <link href="images/favicon.png" rel="shortcut icon" type="image/x-icon"/>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player@latest"></script>
  <style>
    @view-transition { navigation: auto; }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
    input, textarea, [contenteditable="true"] { -webkit-user-select: text; user-select: text; }
    ::selection { background: transparent; }
    html, body {
      background: #0d0d0d;
      color: #fff;
      font-family: 'DM Mono', monospace;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
    }
    button { font: inherit; color: inherit; cursor: pointer; }
    input, textarea { font: inherit; color: inherit; }

    .topbar {
      padding: 22px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .topbar-mark {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: inherit;
      text-decoration: none;
    }
    .topbar-mark:hover { opacity: 0.7; }
    .topbar-mark .dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: rgb(220, 40, 40); margin-right: 10px; vertical-align: middle;
    }
    .topbar-actions { display: flex; gap: 16px; align-items: center; }
    .topbar-link {
      background: none; border: none; padding: 0;
      font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(255, 255, 255, 0.45); transition: color 150ms;
    }
    .topbar-link:hover { color: #fff; }

    .admin-tabs {
      display: flex;
      gap: 0;
      padding: 0 32px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: #0d0d0d;
    }
    .admin-tab {
      padding: 14px 22px;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 150ms, border-color 150ms;
    }
    .admin-tab:hover { color: rgba(255,255,255,0.75); }
    .admin-tab.active { color: #fff; border-bottom-color: rgb(220, 40, 40); }

    .signout-bottom {
      position: fixed;
      bottom: 22px;
      right: 32px;
      background: none;
      border: none;
      padding: 8px 12px;
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.45);
      transition: color 150ms;
      cursor: pointer;
    }
    .signout-bottom:hover { color: #fff; }

    .container { max-width: 980px; margin: 0 auto; padding: 48px 32px 80px; }

    .page-title {
      font-size: 22px; font-weight: 500; letter-spacing: -0.005em; margin-bottom: 4px;
    }
    .page-sub {
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35); margin-bottom: 36px;
    }

    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .btn {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #fff;
      padding: 9px 16px;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: background 150ms, border-color 150ms;
    }
    .btn:hover { background: rgba(255, 255, 255, 0.12); border-color: rgba(255, 255, 255, 0.25); }
    .btn-primary { background: rgb(220, 40, 40); border-color: rgb(220, 40, 40); }
    .btn-primary:hover { background: rgb(200, 30, 30); border-color: rgb(200, 30, 30); }
    .btn-quiet {
      background: none; border: none; padding: 4px 8px;
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
    }
    .btn-quiet:hover { color: #fff; }
    .btn-quiet.btn-cog {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 4px; line-height: 0; cursor: pointer;
    }
    .btn-quiet.btn-cog svg { display: block; }
    a.btn-quiet { text-decoration: none; display: inline-block; }
    .btn-danger { color: rgb(220, 80, 80); }
    .btn-danger:hover { color: rgb(255, 100, 100); }

    .list { display: flex; flex-direction: column; gap: 1px; background: rgba(255,255,255,0.05); }
    .list-row {
      display: grid;
      grid-template-columns: 1fr 100px 120px 200px;
      gap: 16px;
      align-items: center;
      padding: 16px 18px;
      background: #131313;
    }
    .list-row:hover { background: #181818; }
    .row-title { font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.9); }
    .row-sub { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 4px; letter-spacing: 0.06em; }
    .pill {
      display: inline-block; padding: 3px 10px; font-size: 9px; letter-spacing: 0.16em;
      text-transform: uppercase; border: 1px solid rgba(255,255,255,0.15); border-radius: 999px;
    }
    .pill.draft { color: rgba(255,255,255,0.5); }
    .pill.published { color: rgb(80, 220, 120); border-color: rgba(80,220,120,0.4); }
    .pill.archived { color: rgba(255,255,255,0.3); }
    .pill.category { color: rgb(180, 160, 240); border-color: rgba(180,160,240,0.4); }
    .row-counts { font-size: 11px; color: rgba(255,255,255,0.5); font-variant-numeric: tabular-nums; }
    .row-actions { display: flex; gap: 12px; justify-content: flex-end; }

    .empty {
      padding: 64px 32px;
      text-align: center;
      background: #131313;
      border: 1px dashed rgba(255,255,255,0.08);
    }
    .empty-title { font-size: 14px; margin-bottom: 8px; }
    .empty-msg { font-size: 11px; color: rgba(255,255,255,0.4); }

    /* Editor */
    .editor-grid { display: grid; grid-template-columns: 1fr; gap: 32px; }
    .editor-section {
      padding: 24px;
      background: #131313;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
    .field-label {
      font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }
    .field-input, .field-textarea {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 10px 12px;
      color: #fff;
      font-size: 13px;
      font-family: inherit;
    }
    .field-input:focus, .field-textarea:focus { outline: none; border-color: rgba(255,255,255,0.25); }
    .field-textarea { resize: vertical; min-height: 80px; }

    .status-toggle { display: flex; gap: 0; }
    .status-toggle button {
      flex: 1; padding: 10px; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5); transition: background 150ms;
    }
    .status-toggle button + button { border-left: none; }
    .status-toggle button.active {
      background: rgb(220, 40, 40); border-color: rgb(220, 40, 40); color: #fff;
    }

    .share-row { display: flex; gap: 8px; align-items: center; }
    .share-link {
      flex: 1; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      padding: 10px 12px; font-size: 11px; color: rgba(255,255,255,0.7);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .dropzone {
      border: 2px dashed rgba(255,255,255,0.1);
      padding: 36px 24px;
      text-align: center;
      transition: border-color 150ms, background 150ms;
    }
    .dropzone.over { border-color: rgb(220, 40, 40); background: rgba(220,40,40,0.05); }
    .dropzone-title { font-size: 13px; margin-bottom: 6px; }
    .dropzone-sub { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 0.08em; margin-bottom: 18px; }
    .dropzone-btn {
      display: inline-block;
      padding: 9px 22px;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      background: rgb(220, 40, 40);
      border: 1px solid rgb(220, 40, 40);
      color: #fff;
      cursor: pointer;
      transition: background 150ms;
    }
    .dropzone-btn:hover { background: rgb(200, 30, 30); }

    .uploads { display: flex; flex-direction: column; gap: 1px; background: rgba(255,255,255,0.05); margin-top: 12px; }
    .upload-row {
      display: grid;
      grid-template-columns: 1fr 60px 60px;
      gap: 12px;
      align-items: center;
      padding: 10px 16px;
      background: #131313;
      font-size: 11px;
    }
    .upload-name {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: rgba(255,255,255,0.85);
    }
    .upload-bar {
      grid-column: 1 / 3;
      height: 2px;
      background: rgba(255,255,255,0.08);
      margin-top: 6px;
      overflow: hidden;
    }
    .upload-bar-fill {
      height: 100%;
      background: rgb(220, 40, 40);
      width: 0%;
      transition: width 150ms;
    }
    .upload-pct {
      font-variant-numeric: tabular-nums;
      color: rgba(255,255,255,0.5);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-align: right;
    }
    .upload-status {
      font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      text-align: right;
    }
    .upload-status.error { color: rgb(220, 80, 80); }
    .spinner {
      display: inline-block; width: 10px; height: 10px;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-top-color: rgb(220, 40, 40);
      border-radius: 50%;
      animation: spin 700ms linear infinite;
      vertical-align: -1px;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Loading bar — matches the landing page (red fill, soft track, 40% width). */
    .loader {
      min-height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 32px;
      text-align: center;
    }
    .loader-text {
      font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(255, 255, 255, 0.45);
      margin-bottom: 14px;
    }
    .loader-bar {
      width: 40%; max-width: 280px;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      margin: 0 auto;
      overflow: hidden;
      position: relative;
    }
    .loader-bar::after {
      content: '';
      position: absolute; top: 0; left: 0; height: 100%;
      width: 30%;
      background: rgb(220, 40, 40);
      border-radius: 2px;
      animation: loader-bar-slide 1.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes loader-bar-slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(333%); }
    }

    .assets { display: flex; flex-direction: column; gap: 1px; background: rgba(255,255,255,0.05); margin-top: 18px; }
    .asset {
      display: grid;
      grid-template-columns: 24px 76px 1fr 90px 80px 60px;
      gap: 12px;
      align-items: center;
      padding: 10px 16px;
      background: #131313;
    }
    .asset-thumb {
      width: 76px; height: 43px;
      background: #000 center/cover no-repeat;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .asset-handle {
      cursor: grab; color: rgba(255,255,255,0.25); font-size: 14px;
      user-select: none;
    }
    .asset-handle:active { cursor: grabbing; }
    .asset-title-input {
      background: transparent; border: none; padding: 0; font-size: 12px; color: rgba(255,255,255,0.85);
      width: 100%;
    }
    .asset-title-input:focus { outline: none; color: #fff; }
    .asset-status {
      font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.4); text-align: right;
    }
    .asset-status.ready { color: rgb(80, 220, 120); }
    .asset-status.error { color: rgb(220, 80, 80); }

    .upload-progress {
      grid-column: 1 / -1;
      height: 2px;
      background: rgba(255,255,255,0.08);
      margin-top: 8px;
      overflow: hidden;
    }
    .upload-progress-bar {
      height: 100%;
      background: rgb(220, 40, 40);
      width: 0%;
      transition: width 200ms;
    }

    .gate, .login-shell {
      max-width: 420px; margin: 120px auto; padding: 0 32px; text-align: center;
    }
    .gate-title { font-size: 16px; margin-bottom: 12px; }
    .gate-msg { font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.6; }

    .toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      background: rgba(20,20,20,0.95); border: 1px solid rgba(255,255,255,0.1);
      padding: 10px 18px; font-size: 11px; letter-spacing: 0.08em;
      opacity: 0; transition: opacity 200ms; pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* Poster modal */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center; justify-content: center;
      z-index: 100;
      backdrop-filter: blur(6px);
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      width: 720px; max-width: 92vw;
      max-height: 88vh; overflow: auto;
      background: #131313;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 24px;
    }
    .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 14px; font-weight: 400; }
    .modal-close { background: none; border: none; font-size: 16px; color: rgba(255,255,255,0.5); padding: 4px 8px; }
    .modal-tabs { display: flex; margin-bottom: 18px; }
    .modal-tab {
      padding: 8px 16px; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
      background: transparent; border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5);
    }
    .modal-tab + .modal-tab { border-left: none; }
    .modal-tab.active { color: #fff; background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.25); position: relative; z-index: 1; }
    .modal-pane { display: none; }
    .modal-pane.active { display: block; }
    .pane-current {
      display: flex; gap: 16px; margin-bottom: 18px;
      align-items: center;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .pane-current-thumb { width: 120px; height: 67px; background: #000 center/cover no-repeat; border: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
    .pane-current-meta { flex: 1; font-size: 11px; color: rgba(255,255,255,0.6); }
    .pane-current-meta strong { color: #fff; font-weight: 400; display: block; margin-bottom: 4px; }
    .pane-upload-zone {
      border: 2px dashed rgba(255,255,255,0.1);
      padding: 36px 24px;
      text-align: center;
      margin-bottom: 16px;
    }
    .pane-upload-zone.over { border-color: rgb(220, 40, 40); background: rgba(220,40,40,0.05); }
    .frame-player { width: 100%; aspect-ratio: 16/9; margin-bottom: 14px; background: #000; }
    .frame-player mux-player { width: 100%; height: 100%; }
    .frame-actions { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .frame-time { font-variant-numeric: tabular-nums; color: rgba(255,255,255,0.6); font-size: 11px; }
    .modal-foot { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }

    /* Crop pane — 16:9 viewport over the source image; user drags to pan the
       focal point and uses the slider / wheel to zoom 1.0–3.0×. */
    .crop-stage {
      width: 100%; aspect-ratio: 16/9; margin-bottom: 14px;
      background: #000;
      position: relative; overflow: hidden;
      cursor: grab; user-select: none;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .crop-stage.dragging { cursor: grabbing; }
    .crop-stage-img {
      position: absolute; left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: #000;
      background-repeat: no-repeat;
      pointer-events: none;
      will-change: background-position, background-size;
    }
    .crop-stage-grid {
      position: absolute; inset: 0;
      pointer-events: none;
      background:
        linear-gradient(to right,  transparent 33.33%, rgba(255,255,255,0.18) 33.33%, rgba(255,255,255,0.18) 33.5%, transparent 33.5%, transparent 66.66%, rgba(255,255,255,0.18) 66.66%, rgba(255,255,255,0.18) 66.83%, transparent 66.83%),
        linear-gradient(to bottom, transparent 33.33%, rgba(255,255,255,0.18) 33.33%, rgba(255,255,255,0.18) 33.5%, transparent 33.5%, transparent 66.66%, rgba(255,255,255,0.18) 66.66%, rgba(255,255,255,0.18) 66.83%, transparent 66.83%);
      opacity: 0; transition: opacity 150ms ease;
    }
    .crop-stage:hover .crop-stage-grid,
    .crop-stage.dragging .crop-stage-grid { opacity: 1; }
    .crop-controls {
      display: grid; grid-template-columns: 60px 1fr 50px; gap: 12px;
      align-items: center; margin-bottom: 10px;
      font-size: 11px; color: rgba(255,255,255,0.6);
    }
    .crop-controls input[type="range"] {
      -webkit-appearance: none; width: 100%; height: 4px;
      background: rgba(255,255,255,0.12); border-radius: 2px; outline: none;
    }
    .crop-controls input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: rgb(220, 40, 40); cursor: pointer; border: 0;
    }
    .crop-controls input[type="range"]::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%;
      background: rgb(220, 40, 40); cursor: pointer; border: 0;
    }
    .crop-controls-row { display: flex; gap: 24px; margin-bottom: 14px; }
    .crop-coord { font-variant-numeric: tabular-nums; }
    .crop-hint { font-size: 10px; letter-spacing: 0.08em; color: rgba(255,255,255,0.35); text-transform: uppercase; }
    .crop-actions { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  </style>
</head>
<body>
  <header class="topbar">
    <a href="/" class="topbar-mark"><span class="dot"></span>NIPC // Admin</a>
    <div class="topbar-actions">
      <button class="topbar-link" id="back-link" style="display:none">&larr; Back to list</button>
      <a href="/" class="topbar-link">Clients</a>
    </div>
  </header>
  <button class="signout-bottom" id="signout">Sign out</button>

  <nav class="admin-tabs">
    <a href="/admin-frameio.html" class="admin-tab">Frame.io</a>
    <a href="/admin-reels.html" class="admin-tab active">Reels</a>
  </nav>

  <main class="container" id="main"></main>
  <div class="toast" id="toast"></div>

  <div class="modal-backdrop" id="poster-modal">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title" id="poster-title">Poster frame</div>
        <button class="modal-close" id="poster-close">&times;</button>
      </div>

      <div class="pane-current" id="poster-current"></div>

      <div class="modal-tabs">
        <button class="modal-tab active" data-tab="frame">Pick frame</button>
        <button class="modal-tab" data-tab="upload">Upload image</button>
        <button class="modal-tab" data-tab="crop">Crop &amp; scale</button>
      </div>

      <div class="modal-pane active" data-pane="frame">
        <div class="frame-player" id="frame-player-wrap"></div>
        <div class="frame-actions">
          <div class="frame-time" id="frame-time">Scrub the video, then pick a frame.</div>
          <button class="btn btn-primary" id="use-frame">Use this frame</button>
        </div>
      </div>

      <div class="modal-pane" data-pane="upload">
        <div class="pane-upload-zone" id="poster-dz">
          <input type="file" id="poster-file" accept="image/*" style="display:none"/>
          <div class="dropzone-title">Drop an image here</div>
          <div class="dropzone-sub">.jpg / .png / .webp</div>
          <button type="button" class="dropzone-btn" id="poster-pick" style="margin-top:14px;">Choose Image</button>
          <div class="frame-time" id="poster-upload-status" style="margin-top:14px;"></div>
        </div>
      </div>

      <div class="modal-pane" data-pane="crop">
        <div class="crop-stage" id="crop-stage">
          <div class="crop-stage-img" id="crop-stage-img"></div>
          <div class="crop-stage-grid"></div>
        </div>
        <div class="crop-controls">
          <div class="crop-hint">Zoom</div>
          <input type="range" id="crop-zoom" min="100" max="300" step="1" value="100"/>
          <div class="crop-coord" id="crop-zoom-val">1.00×</div>
        </div>
        <div class="crop-controls-row">
          <div class="crop-hint">Focal <span class="crop-coord" id="crop-focal-val">50% &middot; 50%</span></div>
          <div class="crop-hint" style="margin-left:auto;">Drag the image to pan &middot; scroll to zoom</div>
        </div>
        <div class="crop-actions">
          <button class="btn-quiet" id="crop-reset">Reset crop</button>
          <button class="btn btn-primary" id="crop-save">Save crop</button>
        </div>
      </div>

      <div class="modal-foot">
        <button class="btn-quiet" id="poster-reset">Reset to default</button>
      </div>
    </div>
  </div>

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){
        return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c];

    function toast(msg) {

    async function api(path, opts) {
      var session = (await sb.auth.getSession()).data.session;
      if (!session) { location.href = '/'; return; }
      var headers = Object.assign({ 'Content-Type': 'application/json' }, (opts && opts.headers) || {});
      headers.Authorization = 'Bearer ' + session.access_token;
      var res = await fetch(path, Object.assign({}, opts, { headers: headers }));
      var data = res.status === 204 ? {} : await res.json();
      if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
      return data;
    }

          var count = items.filter(c.filter).length;

    function adminPosterFor(a) {
      return a.poster || '';

    // Mirrors reel.html applyPosterCropToEl for static <div> thumbs: pan with
    // background-position, magnify by oversizing the background. The list and
    // the modal "Current poster" preview must show the saved framing, or
    // saving the crop appears to be a no-op even though it persisted.
    function adminThumbStyleAttr(a) {
      var fx = a && a.poster_focal_x != null ? Number(a.poster_focal_x) : 50;
      var fy = a && a.poster_focal_y != null ? Number(a.poster_focal_y) : 50;
      var z  = a && a.poster_zoom    != null ? Number(a.poster_zoom)    : 1;
      var size = z === 1 ? 'cover' : ((100 * z).toFixed(2) + '% ' + (100 * z).toFixed(2) + '%');
      return 'background-image:url(' + escapeHtml(adminPosterFor(a)) + ');' +
             'background-size:' + size + ';' +
             'background-position:' + fx + '% ' + fy + '%;';
    }
    function fmtSec(s) {
      if (s == null || isNaN(s)) return '';
      var t = Math.round(s * 10) / 10;
      var m = Math.floor(t / 60);
      var r = (t - m * 60).toFixed(1);
      return m + ':' + (r < 10 ? '0' + r : r);
    }
    // Millisecond-precision time format for the frame picker — "0:01.567".
    function fmtFrameTime(s) {
      if (s == null || !isFinite(s)) return '0:00.000';
      var m = Math.floor(s / 60);
      var rest = s - m * 60;
      var ss = rest.toFixed(3);
      return m + ':' + (rest < 10 ? '0' + ss : ss);
    }

        html += '      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>';

      for (var j = 0; j < categories.length; j++) {

        html += '  <div class="row-actions">';
        html += '    <button class="btn-quiet" data-act="copy" data-slug="' + escapeHtml(c.slug) + '">Copy link</button>';
        html += '    <a class="btn-quiet" data-act="open" href="' + escapeHtml(shareUrl(c.slug)) + '" target="_blank" rel="noopener">Open &rarr;</a>';
        html += '  </div>';

      html += '</div>';

      $main.querySelectorAll('[data-act="copy"]').forEach(function(b){
        b.addEventListener('click', function(){
          navigator.clipboard.writeText(shareUrl(b.dataset.slug));
          toast('Share link copied');
        });
      });
      $main.querySelectorAll('[data-act="settings"]').forEach(function(b){
        b.addEventListener('click', function(){ location.hash = '#/reel/' + b.dataset.id; });

    async function onNewReel() {
      var title = prompt('Reel title (e.g. "Footwear Commercial Reel 2026")');
      if (!title) return;
      try {
        var r = await api('/api/reels/create', { method: 'POST', body: JSON.stringify({ title: title }) });

    // ── Editor view ──
    async function renderEditor(reelId) {
      $back.style.display = 'inline-block';
      if (pollHandle) { clearInterval(pollHandle); pollHandle = null; }
      $main.innerHTML = '<div class="loader"><div class="loader-text">Loading</div><div class="loader-bar"></div></div>';

      var listData;
      try { listData = await api('/api/reels/list'); } catch (e) { return toast('Error: ' + e.message); }
      var reel = (listData.reels || []).find(function(x){ return x.id === reelId; });
      if (!reel) { location.hash = ''; return; }

      var assets = await fetchAssets(reelId);
      drawEditor(reel, assets);
      startPolling(reel, reelId);
    }

    function startPolling(reel, reelId) {
      pollHandle = setInterval(async function() {
        var ass = await fetchAssets(reelId);
        var stillProcessing = ass.some(function(a){ return a.status === 'encoding' || a.status === 'uploading'; });
        ass.forEach(function(a){
          var row = document.querySelector('.asset[data-id="' + a.id + '"] .asset-status');
          if (row) {
            row.className = 'asset-status ' + a.status;
            row.innerHTML = a.status + (a.duration_seconds ? ' &middot; ' + Math.round(a.duration_seconds) + 's' : '');
          }
        });
        if (!stillProcessing) { clearInterval(pollHandle); pollHandle = null; }
      }, 5000);
    }

    async function fetchAssets(reelId) {
      try {
        var data = await api('/api/reels/admin-assets?reel_id=' + encodeURIComponent(reelId));
        return data.assets || [];
      } catch (e) {
        toast('Asset query: ' + e.message);
        return [];
      }
    }

    function drawEditor(reel, assets, isUpdate) {
      var html = '';
      html += '<div class="page-title">' + escapeHtml(reel.title) + '</div>';
      html += '<div class="page-sub">' + escapeHtml(reel.s3_prefix) + '</div>';

      html += '<div class="editor-grid">';

      html += '<div class="editor-section">';
      html += '  <div class="field"><label class="field-label">Title</label><input class="field-input" id="f-title" value="' + escapeHtml(reel.title) + '"/></div>';
      html += '  <div class="field"><label class="field-label">Description</label><textarea class="field-textarea" id="f-desc">' + escapeHtml(reel.description || '') + '</textarea></div>';
      html += '  <div class="field"><label class="field-label">Status</label>';
      html += '    <div class="status-toggle">';
      ['draft','published','archived'].forEach(function(s){
        html += '<button data-status="' + s + '" class="' + (reel.status === s ? 'active' : '') + '">' + s + '</button>';
      });
      html += '    </div></div>';
      html += '  <div class="field"><label class="field-label">Share link</label>';
      html += '    <div class="share-row"><div class="share-link">' + escapeHtml(shareUrl(reel.slug)) + '</div>';
      html += '      <button class="btn" id="copy-link">Copy</button></div></div>';
      html += '  <div style="display:flex; justify-content:flex-end; gap: 12px;">';
      html += '    <button class="btn-quiet btn-danger" id="delete-reel">Delete reel</button>';
      html += '    <button class="btn btn-primary" id="save-meta">Save</button>';
      html += '  </div>';
      html += '</div>';

      html += '<div class="editor-section">';
      html += '  <div class="field-label" style="margin-bottom:14px;">Videos &middot; ' + assets.length + '</div>';
      html += '  <div class="dropzone" id="dz">';
      html += '    <input type="file" id="dz-input" multiple accept="video/*,.mov,.mp4,.mkv,.webm,.m4v,.mxf" style="display:none"/>';
      html += '    <div class="dropzone-title">Drop video files here</div>';
      html += '    <div class="dropzone-sub">.mov / .mp4 / .mkv / .webm</div>';
      html += '    <button type="button" class="dropzone-btn" id="dz-btn">Choose File</button>';
      html += '  </div>';
      html += '  <div class="uploads" id="uploads"></div>';
      html += '  <div class="assets" id="assets">';
      if (!assets.length) {
        html += '<div class="empty" style="border:none; padding: 40px;"><div class="empty-msg">No videos yet.</div></div>';
      } else {
        assets.forEach(function(a, i){
          html += '<div class="asset" data-id="' + a.id + '" draggable="true">';
          html += '  <div class="asset-handle">::</div>';
          html += '  <div class="asset-thumb" data-role="thumb" style="' + adminThumbStyleAttr(a) + '"></div>';
          html += '  <input class="asset-title-input" data-id="' + a.id + '" value="' + escapeHtml(a.title || a.s3_key.split("/").pop()) + '"/>';
          html += '  <div class="asset-status ' + escapeHtml(a.status) + '">' + escapeHtml(a.status) + (a.duration_seconds ? ' &middot; ' + Math.round(a.duration_seconds) + 's' : '') + '</div>';
          html += '  <div style="text-align:right;"><button class="btn-quiet" data-act="poster" data-id="' + a.id + '">Poster</button></div>';
          html += '  <div style="text-align:right;"><button class="btn-quiet btn-danger" data-act="del-asset" data-id="' + a.id + '">Delete</button></div>';
          html += '</div>';
        });
      }
      html += '  </div>';
      html += '</div>';

      html += '</div>';
      $main.innerHTML = html;

      document.getElementById('save-meta').addEventListener('click', async function(){
        var status = $main.querySelector('.status-toggle .active').dataset.status;
        try {
          await api('/api/reels/update', { method: 'POST', body: JSON.stringify({
            id: reel.id,
            title: document.getElementById('f-title').value,
            description: document.getElementById('f-desc').value,
            status: status,
          })});
          toast('Saved');
          reel.title = document.getElementById('f-title').value;
          reel.description = document.getElementById('f-desc').value;
          reel.status = status;
        } catch (e) { toast('Save failed: ' + e.message); }
      });

      $main.querySelectorAll('.status-toggle button').forEach(function(b){
        b.addEventListener('click', function(){
          $main.querySelectorAll('.status-toggle button').forEach(function(x){ x.classList.remove('active'); });
          b.classList.add('active');
        });
      });

      document.getElementById('copy-link').addEventListener('click', function(){
        navigator.clipboard.writeText(shareUrl(reel.slug)); toast('Copied');
      });

      document.getElementById('delete-reel').addEventListener('click', async function(){
        if (!confirm('Delete this reel and all its videos? This cannot be undone.')) return;
        try { await api('/api/reels/delete', { method: 'POST', body: JSON.stringify({ id: reel.id }) }); location.hash = ''; }
        catch (e) { toast('Delete failed: ' + e.message); }
      });

      $main.querySelectorAll('[data-act="del-asset"]').forEach(function(b){
        b.addEventListener('click', async function(){
          if (!confirm('Delete this video?')) return;
          try {
            await api('/api/reels/delete-asset', { method: 'POST',
              body: JSON.stringify({ reel_id: reel.id, asset_id: b.dataset.id })
            });
            renderEditor(reel.id);
          } catch (e) { toast('Delete failed: ' + e.message); }
        });
      });

      $main.querySelectorAll('[data-act="poster"]').forEach(function(b){
        b.addEventListener('click', function(){
          var asset = assets.find(function(x){ return x.id === b.dataset.id; });
          if (asset) openPosterModal(reel, asset);
        });
      });

      $main.querySelectorAll('.asset-title-input').forEach(function(inp){
        var initial = inp.value;
        inp.addEventListener('blur', async function(){
          if (inp.value === initial) return;
          try {
            await api('/api/reels/update-asset', {
              method: 'POST',
              body: JSON.stringify({ reel_id: reel.id, asset_id: inp.dataset.id, title: inp.value })
            });
            initial = inp.value;
            toast('Renamed');
          } catch (e) { toast('Rename failed: ' + e.message); }
        });
      });

      // Drag-and-drop + Choose File button
      var dz = document.getElementById('dz');
      var dzInput = document.getElementById('dz-input');
      var dzBtn = document.getElementById('dz-btn');
      dzBtn.addEventListener('click', function(e){
        e.stopPropagation();
        dzInput.click();
      });
      dzInput.addEventListener('change', async function(){
        var files = Array.from(dzInput.files || []);
        dzInput.value = '';
        if (files.length) await runUploads(reel.id, files);
      });
      dz.addEventListener('dragover', function(e){ e.preventDefault(); dz.classList.add('over'); });
      dz.addEventListener('dragleave', function(){ dz.classList.remove('over'); });
      dz.addEventListener('drop', async function(e){
        e.preventDefault(); dz.classList.remove('over');
        var files = Array.from(e.dataTransfer.files || []);
        if (files.length) await runUploads(reel.id, files);
      });

      // Drag-reorder
      var dragId = null;
      $main.querySelectorAll('.asset[draggable="true"]').forEach(function(row){
        row.addEventListener('dragstart', function(e){ dragId = row.dataset.id; row.style.opacity = '0.5'; });
        row.addEventListener('dragend', function(){ row.style.opacity = ''; });
        row.addEventListener('dragover', function(e){ e.preventDefault(); });
        row.addEventListener('drop', async function(e){
          e.preventDefault();
          if (!dragId || dragId === row.dataset.id) return;
          var ids = Array.from($main.querySelectorAll('.asset')).map(function(r){ return r.dataset.id; });
          var fromIdx = ids.indexOf(dragId);
          var toIdx = ids.indexOf(row.dataset.id);
          if (fromIdx < 0 || toIdx < 0) return;
          ids.splice(toIdx, 0, ids.splice(fromIdx, 1)[0]);
          for (var i = 0; i < ids.length; i++) {
            try { await api('/api/reels/update-asset', {
              method: 'POST', body: JSON.stringify({ reel_id: reel.id, asset_id: ids[i], sort_order: i })
            }); } catch (e) {}
          }
          renderEditor(reel.id);
        });
      });
    }

    async function runUploads(reelId, files) {
      var uploadsEl = document.getElementById('uploads');
      var rows = files.map(function(f, i){
        var rowId = 'up-' + Date.now() + '-' + i;
        var html =
          '<div class="upload-row" id="' + rowId + '">' +
            '<div class="upload-name">' + escapeHtml(f.name) + '</div>' +
            '<div class="upload-pct" data-role="pct">0%</div>' +
            '<div class="upload-status" data-role="status"><span class="spinner"></span>uploading</div>' +
            '<div class="upload-bar"><div class="upload-bar-fill" data-role="bar"></div></div>' +
          '</div>';
        uploadsEl.insertAdjacentHTML('beforeend', html);
        return { id: rowId, file: f };
      });
      for (var i = 0; i < rows.length; i++) await uploadOne(reelId, rows[i]);
      // Reload editor only if at least one succeeded
      renderEditor(reelId);
    }

    async function uploadOne(reelId, row) {
      var file = row.file;
      var el = document.getElementById(row.id);
      var bar = el.querySelector('[data-role="bar"]');
      var pct = el.querySelector('[data-role="pct"]');
      var status = el.querySelector('[data-role="status"]');

      function setPct(p) { bar.style.width = p + '%'; pct.textContent = p + '%'; }
      function setStatus(text, cls) {
        status.className = 'upload-status' + (cls ? ' ' + cls : '');
        status.innerHTML = (cls === 'error' ? '' : '<span class="spinner"></span>') + text;
      }
      function done(text) { status.className = 'upload-status'; status.textContent = text; el.querySelector('.spinner') && el.querySelector('.spinner').remove(); }

      try {
        var p = await api('/api/reels/presign', {
          method: 'POST',
          body: JSON.stringify({ reel_id: reelId, filename: file.name, contentType: file.type || 'application/octet-stream' })
        });
        await new Promise(function(resolve, reject) {
          var xhr = new XMLHttpRequest();
          xhr.open('PUT', p.url);
          xhr.setRequestHeader('Content-Type', file.type || 'application/octet-stream');
          xhr.upload.onprogress = function(e) {
            if (e.lengthComputable) setPct(Math.round(e.loaded / e.total * 100));
          };
          xhr.onload = function(){
            if (xhr.status >= 200 && xhr.status < 300) resolve();
            else reject(new Error('Storj PUT ' + xhr.status));
          };
          xhr.onerror = function(){ reject(new Error('network error')); };
          xhr.send(file);
        });
        setPct(100);
        setStatus('registering', '');
        await api('/api/reels/register-asset', {
          method: 'POST',
          body: JSON.stringify({ reel_id: reelId, s3_key: p.key, title: file.name.replace(/\.[^.]+$/, '') })
        });
        done('encoding');
      } catch (e) {
        setStatus('failed: ' + e.message, 'error');
        toast('Upload failed: ' + e.message);
      }
    }

    // ── Poster modal ──
    var posterCtx = null;  // { reel, asset }
    var posterModal = document.getElementById('poster-modal');
    var posterPlayer = null;
    // Tracks whether anything was persisted while the modal was open. Used to
    // decide if closing should re-render the editor (refresh thumb / labels).
    // Avoids a redundant render when the user opens the modal and immediately
    // closes it without changes.
    var posterDirty = false;

    function renderPosterCurrent(asset) {
      var label = 'Default (Mux auto frame)';
      if (asset.poster_url) label = 'Custom uploaded image';
      else if (asset.poster_time != null) label = 'Mux frame at ' + fmtSec(asset.poster_time);
      document.getElementById('poster-current').innerHTML =
        '<div class="pane-current-thumb" style="' + adminThumbStyleAttr(asset) + '"></div>' +
        '<div class="pane-current-meta"><strong>Current poster</strong>' + escapeHtml(label) + '</div>';
    }

    // After a source-change operation (Use this frame / Upload), pull the
    // fresh asset row so the crop pane and Current-poster header reflect the
    // new poster URL and the API-reset focal/zoom defaults.
    async function refreshPosterCtx() {
      if (!posterCtx) return;
      var assets = await fetchAssets(posterCtx.reel.id);
      var fresh = assets.find(function(a){ return a.id === posterCtx.asset.id; });
      if (!fresh) return;
      posterCtx.asset = fresh;
      renderPosterCurrent(fresh);
      loadCropFromAsset(fresh);
    }

    function openPosterModal(reel, asset) {
      posterCtx = { reel: reel, asset: asset };
      posterDirty = false;
      document.getElementById('poster-title').textContent = 'Poster: ' + (asset.title || asset.s3_key.split('/').pop());

      renderPosterCurrent(asset);

      // Default tab
      switchTab('frame');

      // Mount mux-player for frame picking
      var wrap = document.getElementById('frame-player-wrap');
      wrap.innerHTML = '';
      posterPlayer = document.createElement('mux-player');
      posterPlayer.setAttribute('playback-id', asset.mux_playback_id);
      posterPlayer.setAttribute('stream-type', 'on-demand');
      posterPlayer.setAttribute('accent-color', '#dc2828');
      posterPlayer.setAttribute('disable-cookies', '');
      // Disable the player's own ← / → handling (default ±5s) so our
      // frame-step handler below owns the keys.
      posterPlayer.setAttribute('hotkeys', 'noarrowleft noarrowright');
      if (asset.poster_time != null) posterPlayer.setAttribute('start-time', String(asset.poster_time));
      wrap.appendChild(posterPlayer);
      posterPlayer.addEventListener('timeupdate', renderFrameTime);
      posterPlayer.addEventListener('seeked', renderFrameTime);
      posterPlayer.addEventListener('loadedmetadata', renderFrameTime);
      renderFrameTime();
      document.addEventListener('keydown', onPosterKeydown, true);

      // Reset upload pane
      document.getElementById('poster-file').value = '';
      document.getElementById('poster-upload-status').textContent = '';

      // Hydrate crop pane from the asset's saved transform.
      loadCropFromAsset(asset);

      posterModal.classList.add('open');
    }

    function closePosterModal() {
      var reelId = posterCtx && posterCtx.reel.id;
      var dirty = posterDirty;
      posterModal.classList.remove('open');
      var wrap = document.getElementById('frame-player-wrap');
      if (posterPlayer) { try { posterPlayer.pause(); } catch (e) {} }
      wrap.innerHTML = '';
      posterPlayer = null;
      posterCtx = null;
      posterDirty = false;
      document.removeEventListener('keydown', onPosterKeydown, true);
      if (dirty && reelId) renderEditor(reelId);
    }

    // Frame-by-frame stepping for the poster picker. 1/30s per arrow press
    // is one full frame at 30fps and a fraction of a frame at higher rates —
    // either way it's a clear win over the player's default 5s jump. Shift
    // accelerates to ~1s steps so you can still cover ground quickly.
    var FRAME_STEP_S = 1 / 30;
    function renderFrameTime() {
      var el = document.getElementById('frame-time');
      if (!el) return;
      var t = posterPlayer && isFinite(posterPlayer.currentTime) ? posterPlayer.currentTime : 0;
      el.textContent = 'Frame at ' + fmtFrameTime(t) + '  ·  ← / → step frame  ·  Shift+← / → step 1s';
    }
    function stepFrame(dir, big) {
      if (!posterPlayer) return;
      try { posterPlayer.pause(); } catch (e) {}
      var t = posterPlayer.currentTime;
      if (!isFinite(t)) return;
      var step = big ? 1 : FRAME_STEP_S;
      var dur = posterPlayer.duration;
      var next = t + dir * step;
      if (isFinite(dur) && dur > 0) next = Math.max(0, Math.min(dur, next));
      else next = Math.max(0, next);
      posterPlayer.currentTime = next;
      renderFrameTime();
    }
    function onPosterKeydown(e) {
      if (!posterModal.classList.contains('open')) return;
      // Only the frame-picker tab cares about arrow keys — let the crop pane
      // do whatever it wants (currently nothing).
      var activeTab = posterModal.querySelector('.modal-tab.active');
      if (!activeTab || activeTab.dataset.tab !== 'frame') return;
      if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
      // Capture-phase + stopPropagation keeps the event from reaching Mux's
      // internal handlers even if the hotkeys attribute isn't honored.
      e.preventDefault();
      e.stopPropagation();
      stepFrame(e.key === 'ArrowLeft' ? -1 : 1, e.shiftKey);
    }

    function switchTab(name) {
      posterModal.querySelectorAll('.modal-tab').forEach(function(t){
        t.classList.toggle('active', t.dataset.tab === name);
      });
      posterModal.querySelectorAll('.modal-pane').forEach(function(p){
        p.classList.toggle('active', p.dataset.pane === name);
      });
    }

    document.getElementById('poster-close').addEventListener('click', closePosterModal);
    posterModal.addEventListener('click', function(e){ if (e.target === posterModal) closePosterModal(); });
    posterModal.querySelectorAll('.modal-tab').forEach(function(t){
      t.addEventListener('click', function(){ switchTab(t.dataset.tab); });
    });

    document.getElementById('use-frame').addEventListener('click', async function(){
      if (!posterCtx || !posterPlayer) return;
      var t = posterPlayer.currentTime;
      if (typeof t !== 'number' || isNaN(t)) { toast('No time available yet'); return; }
      try {
        await api('/api/reels/update-asset', {
          method: 'POST',
          body: JSON.stringify({ reel_id: posterCtx.reel.id, asset_id: posterCtx.asset.id, poster_time: t, poster_url: null })
        });
        posterDirty = true;
        toast('Poster set to frame at ' + fmtSec(t) + ' — adjust framing or close');
        // Hand the user straight to the crop pane on the same poster they
        // just picked; the API has already reset focal/zoom to defaults so
        // they're starting from a clean uncropped frame.
        await refreshPosterCtx();
        switchTab('crop');
      } catch (e) { toast('Failed: ' + e.message); }
    });

    document.getElementById('poster-pick').addEventListener('click', function(){
      document.getElementById('poster-file').click();
    });
    document.getElementById('poster-file').addEventListener('change', async function(){
      var file = this.files && this.files[0];
      if (!file) return;
      await uploadPoster(file);
    });
    var pdz = document.getElementById('poster-dz');
    pdz.addEventListener('dragover', function(e){ e.preventDefault(); pdz.classList.add('over'); });
    pdz.addEventListener('dragleave', function(){ pdz.classList.remove('over'); });
    pdz.addEventListener('drop', async function(e){
      e.preventDefault(); pdz.classList.remove('over');
      var file = (e.dataTransfer.files || [])[0];
      if (file) await uploadPoster(file);
    });

    async function uploadPoster(file) {
      if (!posterCtx) return;
      var status = document.getElementById('poster-upload-status');
      try {
        status.innerHTML = '<span class="spinner"></span>requesting upload URL';
        var p = await api('/api/reels/presign', {
          method: 'POST',
          body: JSON.stringify({ reel_id: posterCtx.reel.id, filename: 'poster-' + file.name, contentType: file.type || 'image/jpeg' })
        });
        await new Promise(function(resolve, reject){
          var xhr = new XMLHttpRequest();
          xhr.open('PUT', p.url);
          xhr.setRequestHeader('Content-Type', file.type || 'image/jpeg');
          xhr.upload.onprogress = function(e){
            if (e.lengthComputable) status.innerHTML = '<span class="spinner"></span>uploading ' + Math.round(e.loaded / e.total * 100) + '%';
          };
          xhr.onload = function(){ xhr.status >= 200 && xhr.status < 300 ? resolve() : reject(new Error('Storj PUT ' + xhr.status)); };
          xhr.onerror = function(){ reject(new Error('network error')); };
          xhr.send(file);
        });
        status.innerHTML = '<span class="spinner"></span>saving';
        await api('/api/reels/update-asset', {
          method: 'POST',
          body: JSON.stringify({ reel_id: posterCtx.reel.id, asset_id: posterCtx.asset.id, poster_url: p.key, poster_time: null })
        });
        posterDirty = true;
        status.textContent = '';
        toast('Poster uploaded — adjust framing or close');
        // Same flow as Use this frame: drop the user onto the crop pane with
        // the freshly uploaded image as the source.
        await refreshPosterCtx();
        switchTab('crop');
      } catch (e) {
        status.textContent = 'Failed: ' + e.message;
        toast('Upload failed: ' + e.message);
      }
    }

    document.getElementById('poster-reset').addEventListener('click', async function(){
      if (!posterCtx) return;
      try {
        await api('/api/reels/update-asset', {
          method: 'POST',
          body: JSON.stringify({
            reel_id: posterCtx.reel.id, asset_id: posterCtx.asset.id,
            poster_url: null, poster_time: null,
            poster_focal_x: 50, poster_focal_y: 50, poster_zoom: 1
          })
        });
        posterDirty = true;
        toast('Reset to default poster');
        closePosterModal();
      } catch (e) { toast('Failed: ' + e.message); }
    });

    // ── Crop pane ──
    // Lets the admin re-frame the chosen poster source (Mux frame OR uploaded
    // image) inside a 16:9 viewport. Pure CSS transform — the source isn't
    // re-encoded. Persists focal_x/focal_y/zoom on reel_assets.
    var cropState = { focalX: 50, focalY: 50, zoom: 1 };
    var cropStage    = document.getElementById('crop-stage');
    var cropStageImg = document.getElementById('crop-stage-img');
    var cropZoomEl   = document.getElementById('crop-zoom');
    var cropZoomVal  = document.getElementById('crop-zoom-val');
    var cropFocalVal = document.getElementById('crop-focal-val');

    function applyCropToEl(el, state) {
      // Pan with background-position; zoom with a CSS scale pivoted on the
      // same focal point so magnifying always grows the image outward from
      // the point the user said matters most. cover semantics keep the
      // short axis filling the viewport with no letterboxing.
      el.style.backgroundSize     = 'cover';
      el.style.backgroundPosition = state.focalX + '% ' + state.focalY + '%';
      el.style.transformOrigin    = state.focalX + '% ' + state.focalY + '%';
      el.style.transform          = state.zoom === 1 ? 'none' : 'scale(' + state.zoom + ')';
    }

    function loadCropFromAsset(asset) {
      cropState.focalX = asset.poster_focal_x != null ? Number(asset.poster_focal_x) : 50;
      cropState.focalY = asset.poster_focal_y != null ? Number(asset.poster_focal_y) : 50;
      cropState.zoom   = asset.poster_zoom    != null ? Number(asset.poster_zoom)    : 1;
      cropStageImg.style.backgroundImage = 'url(' + adminPosterFor(asset) + ')';
      cropZoomEl.value = Math.round(cropState.zoom * 100);
      renderCropUi();
    }

    function renderCropUi() {
      applyCropToEl(cropStageImg, cropState);
      cropZoomVal.textContent  = cropState.zoom.toFixed(2) + '×';
      cropFocalVal.textContent = Math.round(cropState.focalX) + '% · ' + Math.round(cropState.focalY) + '%';
    }

    // Mouse / touch pan: translate movement into focal-point shifts. The
    // effective movement scale depends on zoom — at higher zoom small
    // gestures should move the focal point less, so the pan feels 1:1
    // with what the user sees.
    var dragStart = null;
    function pointerXY(e) {
      if (e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      return { x: e.clientX, y: e.clientY };
    }
    cropStage.addEventListener('mousedown', function(e){ e.preventDefault(); startDrag(e); });
    cropStage.addEventListener('touchstart', function(e){ startDrag(e); }, { passive: true });
    function startDrag(e) {
      var p = pointerXY(e);
      dragStart = { x: p.x, y: p.y, fx: cropState.focalX, fy: cropState.focalY };
      cropStage.classList.add('dragging');
    }
    function onMove(e) {
      if (!dragStart) return;
      var rect = cropStage.getBoundingClientRect();
      var p = pointerXY(e);
      // Movement in % of the stage divided by zoom (so at higher zoom the
      // pan tracks the cursor in source-image space, not stage space).
      var dx = (p.x - dragStart.x) / rect.width  / cropState.zoom * 100;
      var dy = (p.y - dragStart.y) / rect.height / cropState.zoom * 100;
      cropState.focalX = Math.max(0, Math.min(100, dragStart.fx - dx));
      cropState.focalY = Math.max(0, Math.min(100, dragStart.fy - dy));
      renderCropUi();
    }
    function endDrag() { dragStart = null; cropStage.classList.remove('dragging'); }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchmove', onMove, { passive: true });
    document.addEventListener('mouseup', endDrag);
    document.addEventListener('touchend', endDrag);
    document.addEventListener('touchcancel', endDrag);

    // Wheel-to-zoom — keeps the same point under the cursor by inverting
    // the focal-point shift implied by the zoom change.
    cropStage.addEventListener('wheel', function(e){
      e.preventDefault();
      var delta = -e.deltaY / 400;  // ~3 turns to traverse zoom range
      var next = Math.max(1, Math.min(3, cropState.zoom + delta));
      cropState.zoom = next;
      cropZoomEl.value = Math.round(next * 100);
      renderCropUi();
    }, { passive: false });

    cropZoomEl.addEventListener('input', function(){
      cropState.zoom = Number(cropZoomEl.value) / 100;
      renderCropUi();
    });

    document.getElementById('crop-reset').addEventListener('click', function(){
      cropState.focalX = 50; cropState.focalY = 50; cropState.zoom = 1;
      cropZoomEl.value = 100;
      renderCropUi();
    });

    document.getElementById('crop-save').addEventListener('click', async function(){
      if (!posterCtx) return;
      try {
        await api('/api/reels/update-asset', {
          method: 'POST',
          body: JSON.stringify({
            reel_id: posterCtx.reel.id, asset_id: posterCtx.asset.id,
            poster_focal_x: Math.round(cropState.focalX * 10) / 10,
            poster_focal_y: Math.round(cropState.focalY * 10) / 10,
            poster_zoom:    Math.round(cropState.zoom   * 100) / 100,
          })
        });
        posterDirty = true;
        toast('Crop saved');
        closePosterModal();
      } catch (e) { toast('Save failed: ' + e.message); }
    });

    // ── Router ──
    async function route() {
      if (!(await gate())) return;
      var m = location.hash.match(/^#\/reel\/([\w-]+)/);
      if (m) renderEditor(m[1]); else renderList();
    }
    window.addEventListener('hashchange', route);
    route();
  </script>
</body>
</html>
