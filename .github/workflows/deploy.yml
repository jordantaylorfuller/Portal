name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Rewrite video source to release asset
        run: |
          VIDEO_URL="https://github.com/${{ github.repository }}/releases/download/v1.0/video.mp4"
          # Rewrite all video.mp4 references (HTML attributes and JS strings) across all HTML files
          for f in index.html review-queue.html review-mux.html; do
            [ -f "$f" ] && sed -i "s|video\.mp4|${VIDEO_URL}|g" "$f"
          done

      - name: Remove LFS video from deploy (served from release)
        run: rm -f video.mp4

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
