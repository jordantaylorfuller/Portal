name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Rewrite video source to release asset
        run: |
          VIDEO_URL="https://github.com/${{ github.repository }}/releases/download/v1.0/video.mp4"
          sed -i "s|src=\"video.mp4\"|src=\"${VIDEO_URL}\"|g" index.html

      - name: Remove LFS video from deploy (served from release)
        run: rm -f video.mp4

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
