<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>NIPC</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <link href="images/favicon.png" rel="shortcut icon" type="image/x-icon"/>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #0d0d0d;
      color: #fff;
      font-family: 'DM Mono', monospace;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 22px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(13, 13, 13, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .header-mark {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.85);
    }
    .header-mark .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgb(220, 40, 40);
      margin-right: 10px;
      vertical-align: middle;
    }
    .header-meta {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
    }

    .hero {
      padding: 80px 32px 40px;
      max-width: 980px;
      margin: 0 auto;
    }
    .hero-eyebrow {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 18px;
    }
    .hero-title {
      font-size: clamp(28px, 5vw, 56px);
      font-weight: 500;
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin-bottom: 18px;
    }
    .hero-desc {
      font-size: 14px;
      font-weight: 300;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.6);
      max-width: 620px;
    }

    .reels {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 32px 120px;
      display: flex;
      flex-direction: column;
      gap: 64px;
    }

    .reel-item {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .reel-title-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
    }
    .reel-title {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: rgba(255, 255, 255, 0.85);
    }
    .reel-duration {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
      font-variant-numeric: tabular-nums;
    }

    mux-player {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      --controls-backdrop-color: rgba(0, 0, 0, 0.4);
      --media-object-fit: contain;
    }

    .footer {
      max-width: 1180px;
      margin: 0 auto;
      padding: 40px 32px 60px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
    }

    .empty {
      max-width: 720px;
      margin: 80px auto;
      padding: 0 32px;
      text-align: center;
    }
    .empty-title {
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.04em;
      margin-bottom: 12px;
    }
    .empty-msg {
      font-size: 12px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.5);
      line-height: 1.6;
    }

    .loader {
      max-width: 980px;
      margin: 80px auto;
      padding: 0 32px;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-mark"><span class="dot"></span>NIPC</div>
    <div class="header-meta" id="header-meta">Selected Work</div>
  </header>

  <main id="main">
    <div class="loader">Loading.</div>
  </main>

  <script>
    var slug = new URLSearchParams(location.search).get('s');

    function fmtDuration(seconds) {
      if (!seconds) return '';
      var s = Math.round(seconds);
      var m = Math.floor(s / 60);
      var r = s % 60;
      return m + ':' + (r < 10 ? '0' + r : r);
    }

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){
        return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c];
      });
    }

    function renderEmpty(title, msg) {
      document.getElementById('main').innerHTML =
        '<div class="empty">' +
          '<div class="empty-title">' + escapeHtml(title) + '</div>' +
          '<div class="empty-msg">' + escapeHtml(msg) + '</div>' +
        '</div>';
    }

    async function load() {
      if (!slug) return renderEmpty('Reel not found', 'This link is missing a reel identifier.');

      var res, data;
      try {
        res = await fetch('/api/reels/public?s=' + encodeURIComponent(slug));
        data = await res.json();
      } catch (e) {
        return renderEmpty('Connection error', 'Try refreshing the page.');
      }
      if (res.status === 404 || !data.reel) {
        return renderEmpty('Reel not found', 'This reel may have moved or been unpublished.');
      }

      var reel = data.reel;
      var assets = data.assets || [];

      document.title = 'NIPC | ' + reel.title;
      document.getElementById('header-meta').textContent = reel.title;

      var html = '';
      html += '<section class="hero">';
      html += '  <div class="hero-eyebrow">Selected Work</div>';
      html += '  <h1 class="hero-title">' + escapeHtml(reel.title) + '</h1>';
      if (reel.description) {
        html += '<p class="hero-desc">' + escapeHtml(reel.description) + '</p>';
      }
      html += '</section>';

      if (!assets.length) {
        html += '<div class="empty">' +
                  '<div class="empty-title">Coming soon</div>' +
                  '<div class="empty-msg">Videos for this reel are still being prepared.</div>' +
                '</div>';
      } else {
        html += '<section class="reels">';
        for (var i = 0; i < assets.length; i++) {
          var a = assets[i];
          html += '<div class="reel-item">';
          html += '  <div class="reel-title-row">';
          html += '    <div class="reel-title">' + escapeHtml(a.title || 'Untitled') + '</div>';
          if (a.duration_seconds) {
            html += '<div class="reel-duration">' + fmtDuration(a.duration_seconds) + '</div>';
          }
          html += '  </div>';
          html += '  <mux-player playback-id="' + escapeHtml(a.mux_playback_id) + '" stream-type="on-demand" accent-color="#dc2828" disable-cookies></mux-player>';
          html += '</div>';
        }
        html += '</section>';
      }

      html += '<footer class="footer"><div>NIPC &nbsp;//&nbsp; New International Picture Company</div><div>New York</div></footer>';

      document.getElementById('main').innerHTML = html;
    }

    load();
  </script>
</body>
</html>
