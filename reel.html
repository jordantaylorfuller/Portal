<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="robots" content="noindex, nofollow"/>
  <meta charset="utf-8"/>
  <title>NIPC</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <link href="images/favicon.png" rel="shortcut icon" type="image/x-icon"/>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
    input, textarea, [contenteditable="true"] { -webkit-user-select: text; user-select: text; }
    ::selection { background: transparent; }
    :root {
      --reel-w: clamp(560px, 76vw, 1180px);
      --bg: #0a0a0a;
      --text: #ffffff;
      --text-dim: rgba(255, 255, 255, 0.55);
      --text-faint: rgba(255, 255, 255, 0.30);
      --border: rgba(255, 255, 255, 0.08);
      --hover-tint: rgba(255, 255, 255, 0.06);
      --card-shadow: 0 30px 60px rgba(0,0,0,0.75), 0 12px 24px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
      --card-shadow-active: 0 50px 100px rgba(0,0,0,0.85), 0 20px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06), 0 0 80px rgba(220,40,40,0.15);
      --reflect-fade: rgba(0,0,0,0.35);
      --accent: rgb(220, 40, 40);
    }
    :root.light {
      --bg: #f5f3f0;
      --text: rgb(28, 25, 25);
      --text-dim: rgba(28, 25, 25, 0.65);
      --text-faint: rgba(28, 25, 25, 0.35);
      --border: rgba(28, 25, 25, 0.10);
      --hover-tint: rgba(28, 25, 25, 0.05);
      --card-shadow: 0 24px 48px rgba(0,0,0,0.20), 0 8px 16px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.05);
      --card-shadow-active: 0 40px 80px rgba(0,0,0,0.28), 0 16px 32px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.08), 0 0 80px rgba(220,40,40,0.10);
      --reflect-fade: rgba(0,0,0,0.18);
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 350ms ease, color 350ms ease;
    }
    button { font: inherit; color: inherit; cursor: pointer; }
    a { color: inherit; }

    /* ── Top bar ── */
    .t-bar {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 22px 32px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 50;
      pointer-events: none;
      background: var(--bg);
      background-color: color-mix(in srgb, var(--bg) 78%, transparent);
      -webkit-backdrop-filter: saturate(160%) blur(12px);
      backdrop-filter: saturate(160%) blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .t-mark, .t-actions { pointer-events: auto; }
    .t-mark {
      font-size: 11px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase;
      text-decoration: none;
      color: inherit;
      transition: opacity 200ms ease;
    }
    .t-mark:hover { opacity: 0.7; }
    .t-mark .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-right: 10px; vertical-align: middle; }
    .t-actions { display: flex; align-items: center; gap: 8px; }
    .t-tabs { display: flex; gap: 4px; }
    .t-tab {
      position: relative;
      width: 32px; height: 28px;
      padding: 0;
      background: transparent; border: none;
      color: var(--text-faint);
      display: flex; align-items: center; justify-content: center;
      transition: color 150ms ease;
    }
    .t-tab:hover { color: var(--text); }
    .t-tab.active { color: var(--text); }
    .t-tab.active::after {
      content: '';
      position: absolute; left: 8px; right: 8px; bottom: 2px;
      height: 1px;
      background: var(--accent);
    }
    .t-tab svg { width: 14px; height: 14px; display: block; }
    .t-theme {
      width: 32px; height: 32px;
      border: none;
      background: transparent; color: var(--text-dim);
      display: flex; align-items: center; justify-content: center;
      margin-left: 8px;
      transition: color 200ms ease, transform 250ms ease;
    }
    .t-theme:hover { color: var(--text); }
    .t-theme svg { width: 18px; height: 18px; transition: transform 350ms cubic-bezier(0.34, 1.56, 0.64, 1); }
    .t-theme:active svg { transform: rotate(45deg); }

    /* ── Hero ── */
    .h-row {
      width: var(--reel-w);
      margin: 0 auto;
      padding: 110px 0 30px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 32px;
    }
    .h-left { min-width: 0; flex: 1; }
    .h-eyebrow { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 16px; }
    .h-title { font-size: clamp(28px, 5vw, 56px); font-weight: 500; line-height: 1.05; letter-spacing: -0.01em; }
    .h-sub {
      font-size: 13px; font-weight: 300; line-height: 1.7;
      color: var(--text-dim);
      max-width: 360px;
      text-align: right;
      padding-bottom: 6px;
      flex-shrink: 0;
    }
    @media (max-width: 720px) {
      .h-row { flex-direction: column; align-items: flex-start; gap: 16px; }
      .h-sub { text-align: left; max-width: 100%; padding-bottom: 0; }
    }

    /* ── Stage container ── */
    .stage {
      position: relative;
      transition: opacity 250ms ease;
    }
    .stage.swapping { opacity: 0; }

    /* ── Meta strip (active video title + position) ── */
    .meta {
      width: var(--reel-w);
      margin: 22px auto 0;
      padding: 0;
      display: flex; align-items: baseline; justify-content: space-between;
    }
    .meta-title {
      font-size: 14px;
      line-height: 1.4;
      min-height: calc(14px * 1.4 * 2);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: opacity 200ms ease;
      flex: 1 1 auto;
      padding-right: 12px;
    }
    .meta-title.fade { opacity: 0; }
    .meta-pos { align-self: flex-start; padding-top: 2px; }
    .meta-pos {
      font-variant-numeric: tabular-nums;
      font-size: 10px; letter-spacing: 0.20em; text-transform: uppercase;
      color: var(--text-faint);
    }

    /* Top meta strip — duration above player, right-aligned */
    .meta-top {
      width: var(--reel-w);
      margin: 0 auto 14px;
      display: flex; justify-content: flex-end;
      font-variant-numeric: tabular-nums;
      font-size: 10px; letter-spacing: 0.20em; text-transform: uppercase;
      color: var(--text-faint);
      min-height: 14px;
    }

    /* ── List view ── */
    .list-wrap {
      width: var(--reel-w);
      margin: 0 auto;
      padding: 0 0 60px;
      display: flex; flex-direction: column; gap: 64px;
    }
    .list-item { display: flex; flex-direction: column; gap: 12px; }
    .list-row { display: flex; align-items: baseline; justify-content: space-between; }
    .list-title { font-size: 14px; color: var(--text); }
    .list-dur {
      font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--text-faint);
      font-variant-numeric: tabular-nums;
    }
    .list-item mux-player {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      box-shadow: var(--card-shadow-active);
      --media-object-fit: contain;
      --seek-backward-button: none;
      --seek-forward-button: none;
      --captions-button: none;
      --airplay-button: none;
      --cast-button: none;
      --pip-button: none;
    }

    /* ── Cover Flow view ── */
    .cf-stage {
      perspective: 2200px;
      perspective-origin: 50% 45%;
      width: 100vw;
      height: 64vh;
      min-height: 460px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transform-style: preserve-3d;
    }
    .cf-floor {
      position: absolute;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      width: min(92vw, 1100px);
      height: 60px;
      background: radial-gradient(ellipse at center, rgba(220,40,40,0.10), transparent 70%);
      filter: blur(10px);
      pointer-events: none;
    }
    .cf-card {
      position: absolute;
      width: var(--reel-w);
      aspect-ratio: 16/9;
      will-change: transform, filter;
      opacity: 1;
      transition:
        transform 750ms cubic-bezier(0.22, 1, 0.36, 1),
        filter 600ms cubic-bezier(0.22, 1, 0.36, 1);
      transform-style: preserve-3d;
      cursor: pointer;
      box-shadow: var(--card-shadow);
      background: #000 center/cover no-repeat;
      -webkit-box-reflect: below 8px linear-gradient(transparent 60%, var(--reflect-fade));
    }
    .cf-card.is-active {
      box-shadow: var(--card-shadow-active);
    }
    .cf-card mux-player, .cf-card .poster {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      background: center/cover no-repeat #000;
    }
    .cf-card .poster::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0) 60%, rgba(0,0,0,0.4));
    }
    .play-glyph { display: none; }
    /* Hide Mux Player's central big-play button so our white glyph reads. Multiple selectors
       cover different Mux Player versions / Media Chrome internal naming. */
    mux-player::part(top),
    mux-player::part(top-chrome),
    mux-player::part(center),
    mux-player::part(centered-chrome),
    mux-player::part(big-button) { display: none !important; }
    .cf-stage.shifting .cf-card { filter: blur(var(--blur, 0px)) brightness(0.92); }
    .cf-stage:not(.shifting) .cf-card { filter: blur(var(--blur, 0px)); }

    /* ── Stack view ── */
    .stk-wrap {
      position: relative;
      width: var(--reel-w);
      margin: 0 auto;
      padding: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 240px;
      grid-template-rows: auto 1fr;
      align-items: start;
      gap: 0 24px;
    }
    .stk-meta-top {
      grid-column: 1; grid-row: 1;
      display: flex; justify-content: flex-end;
      font-variant-numeric: tabular-nums;
      font-size: 10px; letter-spacing: 0.20em; text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 14px;
      min-height: 14px;
    }
    .stk-featured {
      position: relative;
      grid-column: 1; grid-row: 2;
      width: 100%;
      aspect-ratio: 16/9;
      transition: filter 600ms cubic-bezier(0.22, 1, 0.36, 1);
    }
    .stk-card {
      position: absolute; inset: 0;
      box-shadow: var(--card-shadow-active);
      background: #000 center/cover no-repeat;
    }
    .stk-card mux-player {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      background: #000;
    }
    .stk-thumbs {
      position: relative;
      grid-column: 2; grid-row: 2;
      display: flex; flex-direction: column; gap: 10px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--text-faint) transparent;
      padding-right: 16px;
      margin-right: -16px;
    }
    .stk-thumbs::-webkit-scrollbar { width: 4px; }
    .stk-thumbs::-webkit-scrollbar-thumb { background: var(--text-faint); border-radius: 4px; }
    .stk-thumb {
      position: relative;
      aspect-ratio: 16/9;
      cursor: pointer;
      opacity: 0.78;
      transition: filter 400ms ease, opacity 250ms ease;
      background: #000 center/cover no-repeat;
    }
    .stk-thumb:hover { opacity: 1; }
    .stk-thumb-label {
      position: absolute; left: 12px; right: 12px; bottom: 10px;
      font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(255,255,255,0.95); z-index: 2;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8), 0 0 10px rgba(0,0,0,0.5);
    }
    .stk-thumb.is-active { filter: brightness(0.5); opacity: 0.4; }
    .stk-thumb.is-active:hover { opacity: 0.4; }
    .stk-wrap.shifting .stk-featured,
    .stk-wrap.shifting .stk-thumb { filter: blur(6px); }

    /* ── Mobile: shrink reel width to viewport, reflow stack view vertically ── */
    @media (max-width: 720px) {
      :root { --reel-w: calc(100vw - 32px); }
      .t-bar { padding: 18px 16px; }
      .h-row { padding: 72px 0 12px; }
      .h-eyebrow { margin-bottom: 8px; }
      .h-title { font-size: 30px; }
      body[data-view="cf"] .h-row { padding-bottom: 8px; }
      .cf-stage {
        height: calc((100vw - 32px) * 9 / 16 + 28px);
        min-height: 0;
        touch-action: pan-y;
      }
      body[data-view="cf"] .meta { margin-top: 12px; }
      .stk-wrap {
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows: auto auto auto;
        gap: 14px;
      }
      .stk-meta-top { grid-column: 1; grid-row: 1; margin-bottom: 0; }
      .stk-featured { grid-column: 1; grid-row: 2; }
      .stk-thumbs   { grid-column: 1; grid-row: 3; }
      .stk-thumbs {
        flex-direction: row;
        overflow-x: auto;
        overflow-y: hidden;
        padding-right: 0;
        margin-right: 0;
        height: auto !important;
        gap: 8px;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
      }
      .stk-thumb {
        flex: 0 0 46%;
        scroll-snap-align: start;
      }
      .footer { margin-top: 48px; padding: 24px 0 40px; }
      /* Cover / stack views are single-screen on mobile — no vertical scroll, content centered, footer pinned */
      html:has(body[data-view="cf"]),
      html:has(body[data-view="stack"]) {
        overflow: hidden;
        height: 100dvh;
      }
      body[data-view="cf"],
      body[data-view="stack"] {
        overflow: hidden;
        height: 100dvh;
      }
      body[data-view="cf"] #main,
      body[data-view="stack"] #main {
        display: flex;
        flex-direction: column;
        min-height: 100dvh;
      }
      body[data-view="cf"] .h-row,
      body[data-view="stack"] .h-row {
        margin: auto auto 0;
        padding: 0 0 12px;
      }
      body[data-view="cf"] #stage-area,
      body[data-view="stack"] #stage-area { flex: 0 0 auto; }
      body[data-view="cf"] .footer,
      body[data-view="stack"] .footer {
        margin: auto auto 0;
        padding: 14px 0 22px;
      }
      .footer-loc { display: none; }
    }

    /* ── Footer ── */
    .footer {
      width: var(--reel-w);
      margin: 80px auto 0;
      padding: 32px 0 60px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between;
      font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--text-faint);
    }

    /* ── Scheduler ── */
    .sched-fab {
      position: fixed; right: 24px; bottom: 24px; z-index: 60;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-dim);
      border-radius: 50%;
      cursor: pointer;
      transition: color 200ms ease, border-color 200ms ease, transform 200ms ease;
    }
    .sched-fab:hover { color: var(--text); border-color: var(--text-faint); }
    .sched-fab.open { color: var(--text); border-color: var(--text-faint); transform: rotate(45deg); }
    .sched-fab svg { width: 18px; height: 18px; transition: transform 250ms ease; }

    /* Inline scheduler trigger — desktop hidden, shown in footer on mobile */
    .sched-fab-inline {
      display: none;
      background: none; border: none; padding: 0;
      color: inherit; cursor: pointer; line-height: 0;
      transition: color 200ms ease;
    }
    .sched-fab-inline:hover { color: var(--text); }
    .sched-fab-inline svg { width: 13px; height: 13px; vertical-align: middle; }
    .footer-end { display: flex; align-items: center; gap: 10px; }
    .sched-overlay {
      position: fixed; right: 24px; bottom: 78px; z-index: 200;
      width: 340px; max-width: calc(100vw - 48px);
      background: var(--bg);
      border: 1px solid var(--border);
      box-shadow: var(--card-shadow);
      padding: 18px;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 250ms ease, transform 250ms ease;
    }
    .sched-overlay.open { opacity: 1; transform: translateY(0); pointer-events: auto; }

    @media (max-width: 720px) {
      .sched-fab { display: none; }
      .sched-fab-inline { display: inline-flex; align-items: center; }
      .sched-overlay {
        right: 16px; bottom: 64px; left: 16px;
        width: auto; max-width: none;
        max-height: calc(100dvh - 80px);
        overflow-y: auto;
      }
    }

    .sched-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 14px;
    }
    .sched-title {
      font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text);
    }
    .sched-month {
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim);
    }
    .sched-nav { display: flex; gap: 8px; }
    .sched-nav-btn {
      background: none; border: none; color: var(--text-faint);
      font-family: inherit; font-size: 13px; cursor: pointer; padding: 0;
      transition: color 150ms ease;
    }
    .sched-nav-btn:hover { color: var(--text); }
    .sched-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .sched-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 4px; }
    .sched-weekday {
      font-size: 8px; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-faint); text-align: center; padding: 4px 0;
    }
    .sched-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .sched-day {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 300;
      color: var(--text-faint);
      border: 1px solid transparent;
      border-radius: 2px;
      cursor: default;
      background: none;
    }
    .sched-day.available {
      color: var(--text-dim);
      border-color: var(--border);
      cursor: pointer;
      transition: border-color 150ms ease, color 150ms ease;
    }
    .sched-day.available:hover { border-color: var(--text-faint); color: var(--text); }
    .sched-day.selected { border-color: var(--accent); color: var(--text); background: rgba(220,40,40,0.08); }
    .sched-day.today { color: var(--text); font-weight: 500; }
    .sched-day.past { opacity: 0.25; }

    .sched-times { margin-top: 14px; display: none; flex-direction: column; gap: 4px; max-height: 200px; overflow-y: auto; }
    .sched-times.visible { display: flex; }
    .sched-times-empty {
      font-size: 10px; color: var(--text-faint);
      letter-spacing: 0.06em; text-align: center;
      padding: 16px 0;
    }
    .sched-time {
      font-size: 11px; font-weight: 300; color: var(--text-dim);
      border: 1px solid var(--border); border-radius: 2px;
      padding: 8px 12px; cursor: pointer; background: none; text-align: left;
      font-family: inherit;
      transition: border-color 150ms ease, color 150ms ease;
    }
    .sched-time:hover { border-color: var(--text-faint); color: var(--text); }
    .sched-time.selected { border-color: var(--accent); color: var(--text); background: rgba(220,40,40,0.08); }

    .sched-form { margin-top: 14px; display: none; flex-direction: column; gap: 8px; }
    .sched-form.visible { display: flex; }
    .sched-input {
      background: transparent;
      border: 1px solid var(--border);
      padding: 9px 12px;
      color: var(--text);
      font-family: inherit; font-size: 12px;
    }
    .sched-input:focus { outline: none; border-color: var(--text-faint); }
    .sched-confirm {
      width: 100%;
      font-family: inherit; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase;
      color: #fff;
      border: 1px solid var(--accent);
      background: var(--accent);
      padding: 10px;
      cursor: pointer;
      transition: opacity 150ms ease;
      margin-top: 4px;
    }
    .sched-confirm:hover { opacity: 0.9; }
    .sched-confirm:disabled { opacity: 0.4; cursor: not-allowed; }

    .sched-success {
      padding: 22px 14px; text-align: center;
    }
    .sched-success-title { font-size: 12px; letter-spacing: 0.08em; margin-bottom: 8px; color: var(--text); }
    .sched-success-msg { font-size: 11px; color: var(--text-dim); line-height: 1.6; margin-bottom: 14px; }
    .sched-success a { color: var(--accent); text-decoration: none; font-size: 11px; }
    .sched-success a:hover { text-decoration: underline; }

    .sched-error { font-size: 10px; color: rgb(220,80,80); margin-top: 6px; min-height: 12px; letter-spacing: 0.04em; }

    .empty, .loader {
      max-width: 720px; margin: 200px auto;
      padding: 0 32px; text-align: center;
    }
    .empty-title { font-size: 16px; margin-bottom: 12px; }
    .empty-msg { font-size: 12px; color: var(--text-dim); line-height: 1.6; }
    /* Loading bar — matches the landing page (red fill, soft track, 40% width). */
    .loader-text {
      font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 14px;
    }
    .loader-bar {
      width: 40%; max-width: 280px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto;
      overflow: hidden;
      position: relative;
    }
    .loader-bar::after {
      content: '';
      position: absolute; top: 0; left: 0; height: 100%;
      width: 30%;
      background: var(--accent);
      border-radius: 2px;
      animation: loader-bar-slide 1.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes loader-bar-slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(333%); }
    }

    /* Hide views by default; body class enables one */
    body[data-view="list"]   .view-cf,    body[data-view="list"]   .view-stack,
    body[data-view="cf"]     .view-list,  body[data-view="cf"]     .view-stack,
    body[data-view="stack"]  .view-list,  body[data-view="stack"]  .view-cf {
      display: none !important;
    }
  </style>
</head>
<body data-view="list">
  <header class="t-bar">
    <a class="t-mark" href="/home"><span class="dot"></span>NIPC</a>
    <div class="t-actions">
      <div class="t-tabs" id="t-tabs">
        <button class="t-tab" data-view="list" aria-label="List view" title="List">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="square">
            <rect x="4" y="5" width="16" height="3.2" rx="0.4"/>
            <rect x="4" y="10.4" width="16" height="3.2" rx="0.4"/>
            <rect x="4" y="15.8" width="16" height="3.2" rx="0.4"/>
          </svg>
        </button>
        <button class="t-tab" data-view="cf" aria-label="Cover view" title="Cover">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="square">
            <rect x="2.5" y="7" width="7.5" height="10" rx="0.4" opacity="0.55"/>
            <rect x="14" y="7" width="7.5" height="10" rx="0.4" opacity="0.55"/>
            <rect x="8" y="5" width="8" height="14" rx="0.4"/>
          </svg>
        </button>
        <button class="t-tab" data-view="stack" aria-label="Stack view" title="Stack">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="square">
            <rect x="3" y="5" width="13" height="14" rx="0.4"/>
            <rect x="18" y="5" width="3" height="3.6" rx="0.3"/>
            <rect x="18" y="10.2" width="3" height="3.6" rx="0.3"/>
            <rect x="18" y="15.4" width="3" height="3.6" rx="0.3"/>
          </svg>
        </button>
      </div>
      <button class="t-theme" id="t-theme" aria-label="Toggle theme"></button>
    </div>
  </header>

  <main id="main">
    <div class="loader">
      <div class="loader-text">Loading</div>
      <div class="loader-bar"></div>
    </div>
  </main>

  <button class="sched-fab" id="sched-fab" title="Schedule a call" aria-label="Schedule a call">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="12" height="11" rx="1.5"/>
      <line x1="2" y1="6.5" x2="14" y2="6.5"/>
      <line x1="5.5" y1="1.5" x2="5.5" y2="4.5"/>
      <line x1="10.5" y1="1.5" x2="10.5" y2="4.5"/>
    </svg>
  </button>

  <div class="sched-overlay" id="sched-overlay">
    <div id="sched-body">
      <div class="sched-head">
        <div>
          <div class="sched-title">Schedule a call</div>
          <div class="sched-month" id="sched-month">—</div>
        </div>
        <div class="sched-nav">
          <button class="sched-nav-btn" id="sched-prev" aria-label="Previous month">&lsaquo;</button>
          <button class="sched-nav-btn" id="sched-next" aria-label="Next month">&rsaquo;</button>
        </div>
      </div>
      <div class="sched-weekdays" id="sched-weekdays"></div>
      <div class="sched-days" id="sched-days"></div>
      <div class="sched-times" id="sched-times"></div>
      <div class="sched-form" id="sched-form">
        <input type="text" class="sched-input" id="sched-name" placeholder="Your name (optional)" autocomplete="name"/>
        <input type="email" class="sched-input" id="sched-email" placeholder="Your email" autocomplete="email" required/>
        <button class="sched-confirm" id="sched-confirm" disabled>Confirm booking</button>
        <div class="sched-error" id="sched-error"></div>
      </div>
    </div>
  </div>

  <script>
    // ── Icons ──
    var ICON_MOON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    var ICON_SUN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>';

    var slug = new URLSearchParams(location.search).get('s');
    var assets = [];
    var reel = null;
    var current = 0;
    var view = localStorage.getItem('nipc.reel.view') || 'list';
    var theme = localStorage.getItem('nipc.reel.theme') || 'light';
    var muxEl = null;
    var transitioning = false;

    function applyTheme() {
      document.documentElement.classList.toggle('light', theme === 'light');
      document.getElementById('t-theme').innerHTML = theme === 'light' ? ICON_SUN : ICON_MOON;
    }
    function setTheme(t) { theme = t; localStorage.setItem('nipc.reel.theme', t); applyTheme(); }
    document.getElementById('t-theme').addEventListener('click', function(){ setTheme(theme === 'light' ? 'dark' : 'light'); });
    applyTheme();

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){
        return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c];
      });
    }
    function thumbUrl(playbackId) {
      return 'https://image.mux.com/' + playbackId + '/thumbnail.jpg?width=1280&fit_mode=preserve';
    }
    function posterFor(a) {
      return a.poster || thumbUrl(a.mux_playback_id);
    }
    function fmtDuration(seconds) {
      if (!seconds) return '';
      var s = Math.round(seconds);
      var m = Math.floor(s / 60);
      var r = s % 60;
      return m + ':' + (r < 10 ? '0' + r : r);
    }
    function renderEmpty(title, msg) {
      document.getElementById('main').innerHTML =
        '<div class="empty"><div class="empty-title">' + escapeHtml(title) + '</div>' +
        '<div class="empty-msg">' + escapeHtml(msg) + '</div></div>';
    }

    async function load() {
      if (!slug) return renderEmpty('Reel not found', 'This link is missing a reel identifier.');
      var res, data;
      try {
        res = await fetch('/api/reels/public?s=' + encodeURIComponent(slug));
        data = await res.json();
      } catch (e) { return renderEmpty('Connection error', 'Try refreshing the page.'); }
      if (res.status === 404 || !data.reel) return renderEmpty('Reel not found', 'This reel may have moved or been unpublished.');

      reel = data.reel;
      assets = data.assets || [];
      document.title = 'NIPC | ' + reel.title;

      var html = '';
      html += '<section class="h-row">';
      html += '  <div class="h-left">';
      html += '    <div class="h-eyebrow">Selected Work</div>';
      html += '    <h1 class="h-title">' + escapeHtml(reel.title) + '</h1>';
      html += '  </div>';
      if (reel.description) html += '<p class="h-sub">' + escapeHtml(reel.description) + '</p>';
      html += '</section>';

      if (!assets.length) {
        html += '<div class="empty"><div class="empty-title">Coming soon</div><div class="empty-msg">Videos for this reel are still being prepared.</div></div>';
        document.getElementById('main').innerHTML = html;
        return;
      }

      html += '<div id="stage-area"></div>';
      html += '<footer class="footer">' +
        '<div>NIPC &nbsp;//&nbsp; New International Picture Company</div>' +
        '<div class="footer-end">' +
          '<span class="footer-loc">New York</span>' +
          '<button class="sched-fab-inline" id="sched-inline" type="button" aria-label="Schedule a call">' +
            '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">' +
              '<rect x="2" y="3" width="12" height="11" rx="1.5"/>' +
              '<line x1="2" y1="6.5" x2="14" y2="6.5"/>' +
              '<line x1="5.5" y1="1.5" x2="5.5" y2="4.5"/>' +
              '<line x1="10.5" y1="1.5" x2="10.5" y2="4.5"/>' +
            '</svg>' +
          '</button>' +
        '</div>' +
      '</footer>';

      document.getElementById('main').innerHTML = html;

      setView(view, true);
      bindViewTabs();
    }

    function bindViewTabs() {
      var tabs = document.querySelectorAll('.t-tab');
      tabs.forEach(function(t){
        t.classList.toggle('active', t.dataset.view === view);
        t.addEventListener('click', function(){ setView(t.dataset.view); });
      });
    }

    function setView(v, isInitial) {
      if (!isInitial && v === view) return;
      view = v;
      localStorage.setItem('nipc.reel.view', v);
      document.querySelectorAll('.t-tab').forEach(function(t){
        t.classList.toggle('active', t.dataset.view === v);
      });
      // Tear down current mode
      cleanupMode();
      // Animate swap
      var stage = document.getElementById('stage-area');
      stage.classList.add('swapping');
      setTimeout(function(){
        document.body.dataset.view = v;
        renderView();
        stage.classList.remove('swapping');
      }, isInitial ? 0 : 250);
    }

    function cleanupMode() {
      if (muxEl) { try { muxEl.pause(); } catch (e) {} muxEl.remove(); muxEl = null; }
    }

    function renderView() {
      var stage = document.getElementById('stage-area');
      if (view === 'list') { stage.innerHTML = renderList(); initList(); }
      else if (view === 'cf') { stage.innerHTML = renderCoverFlow(); initCoverFlow(); }
      else if (view === 'stack') { stage.innerHTML = renderStack(); initStack(); }
    }

    function initList() {
      document.querySelectorAll('.list-item').forEach(function(item){
        var p = item.querySelector('mux-player');
        var g = item.querySelector('.play-glyph');
        attachGlyph(p, g);
      });
    }

    // ── List view ──
    function renderList() {
      var html = '<section class="list-wrap view-list">';
      assets.forEach(function(a){
        html += '<div class="list-item">';
        html += '  <div class="list-row">';
        html += '    <div class="list-title">' + escapeHtml(a.title || 'Untitled') + '</div>';
        if (a.duration_seconds) html += '<div class="list-dur">' + fmtDuration(a.duration_seconds) + '</div>';
        html += '  </div>';
        html += '  <div style="position:relative;">';
        html += '    <mux-player playback-id="' + escapeHtml(a.mux_playback_id) + '" poster="' + escapeHtml(posterFor(a)) + '" stream-type="on-demand" accent-color="#dc2828" disable-cookies></mux-player>';
        html += '    <div class="play-glyph"></div>';
        html += '  </div>';
        html += '</div>';
      });
      html += '</section>';
      return html;
    }

    // ── Cover Flow view ──
    function renderCoverFlow() {
      var html = '<div class="meta-top view-cf" id="cf-meta-top"></div>';
      html += '<div class="cf-stage view-cf" id="cf-stage">';
      html += '  <div class="cf-floor"></div>';
      assets.forEach(function(a, i){
        html += '<div class="cf-card" data-i="' + i + '" style="background-image:url(' + posterFor(a) + ')">';
        html += '  <div class="poster" style="background-image:url(' + posterFor(a) + ')"></div>';
        html += '  <div class="play-glyph"></div>';
        html += '</div>';
      });
      html += '</div>';
      html += '<div class="meta view-cf">';
      html += '  <div class="meta-title" id="cf-meta-title"></div>';
      html += '  <div class="meta-pos" id="cf-meta-pos"></div>';
      html += '</div>';
      return html;
    }

    function initCoverFlow() {
      var stage = document.getElementById('cf-stage');
      stage.querySelectorAll('.cf-card').forEach(function(card){
        card.addEventListener('click', function(){
          var i = Number(card.dataset.i);
          if (i !== current) { cfGoTo(i); return; }
          // Tap on active card → mount + play (or toggle pause if already mounted)
          if (!muxEl) cfPlayActive();
          else if (muxEl.paused) muxEl.play();
          else muxEl.pause();
        });
      });

      cfLayout();
      cfUpdateMeta();
    }

    function cfLayout() {
      var cards = document.querySelectorAll('#cf-stage .cf-card');
      cards.forEach(function(card, i){
        var offset = i - current;
        var abs = Math.abs(offset);
        var sign = Math.sign(offset);
        if (abs === 0) {
          card.style.setProperty('--blur', '0px');
          card.style.transform = 'translateX(0) translateZ(0) rotateY(0deg) scale(1)';
          card.style.zIndex = 100;
          card.classList.add('is-active');
        } else {
          var x = sign * (60 + (abs - 1) * 14);
          var z = -180 - (abs - 1) * 90;
          var rot = sign * -50;
          var scale = Math.max(0.78, 1 - abs * 0.07);
          card.style.transform = 'translateX(' + x + 'vw) translateZ(' + z + 'px) rotateY(' + rot + 'deg) scale(' + scale + ')';
          card.style.zIndex = String(50 - abs);
          card.style.setProperty('--blur', Math.min(2, abs * 0.6) + 'px');
          card.classList.remove('is-active');
        }
      });
    }

    function cfGoTo(i) {
      i = Math.max(0, Math.min(assets.length - 1, i));
      if (i === current || transitioning) return;
      transitioning = true;
      var stage = document.getElementById('cf-stage');
      stage.classList.add('shifting');
      var titleEl = document.getElementById('cf-meta-title');
      // Drag preview may have already updated the meta to the target asset.
      // Skip the fade in that case so the title doesn't pointlessly fade out
      // and back in to the same text.
      var preUpdated = !!(titleEl && titleEl.textContent === (assets[i].title || ''));
      if (titleEl && !preUpdated) {
        titleEl.classList.add('fade');
        // Wait through the 200ms fade-out, dwell briefly while cards travel,
        // then swap text + start fade-in at t=450ms. Title fully visible by
        // ~t=650ms; cards settle by ~t=750ms — title arrives just before
        // they land.
        setTimeout(function(){
          cfUpdateMeta();
          titleEl.classList.remove('fade');
        }, 450);
      }
      cleanupMode();
      current = i;
      cfLayout();
      setTimeout(function(){
        stage.classList.remove('shifting');
        transitioning = false;
      }, 700);
    }

    function cfPlayActive() {
      var card = document.querySelector('#cf-stage .cf-card[data-i="' + current + '"]');
      if (!card || muxEl) return;
      var a = assets[current];
      muxEl = makeMux(a.mux_playback_id);
      // Poster + autoplay set BEFORE DOM attach so the first paint shows the
      // poster (no black flash) and playback starts as soon as the player is
      // ready — no second-tap needed.
      muxEl.setAttribute('poster', posterFor(a));
      muxEl.setAttribute('autoplay', '');
      muxEl.setAttribute('preload', 'auto');
      card.appendChild(muxEl);
      attachGlyph(muxEl, card.querySelector('.play-glyph'));
      // iOS Safari requires the play() call to happen inside the user-gesture
      // stack to keep the unmuted-autoplay credit. Call once now, retry on
      // canplay if the player wasn't ready yet.
      var attemptPlay = function(){
        try { var p = muxEl.play(); if (p && p.catch) p.catch(function(){}); } catch(e){}
      };
      attemptPlay();
      muxEl.addEventListener('canplay', attemptPlay, { once: true });
    }

    function cfUpdateMeta() { cfShowMetaFor(current); }
    function cfShowMetaFor(idx) {
      var a = assets[idx];
      if (!a) return;
      var titleEl = document.getElementById('cf-meta-title');
      var posEl = document.getElementById('cf-meta-pos');
      var topEl = document.getElementById('cf-meta-top');
      if (titleEl) titleEl.textContent = a.title || '';
      if (posEl) posEl.textContent = (idx + 1) + ' / ' + assets.length;
      if (topEl) topEl.textContent = fmtDuration(a.duration_seconds);
    }

    // Cover Flow keyboard + wheel (bound globally, ignored when not active)
    function isTypingTarget(el) {
      if (!el) return false;
      var tag = el.tagName;
      return tag === 'INPUT' || tag === 'TEXTAREA' || el.isContentEditable;
    }
    function togglePlayActive() {
      if (view === 'cf') {
        if (!muxEl) { cfPlayActive(); return; }
      } else if (view !== 'stack') {
        return;
      }
      if (!muxEl) return;
      if (muxEl.paused) { try { var p = muxEl.play(); if (p && p.catch) p.catch(function(){}); } catch (e) {} }
      else { try { muxEl.pause(); } catch (e) {} }
    }
    function fullscreenActive() {
      if (view !== 'cf' && view !== 'stack') return;
      // Toggle: if already fullscreen, exit.
      var fsEl = document.fullscreenElement || document.webkitFullscreenElement;
      if (fsEl) {
        var exitFn = document.exitFullscreen || document.webkitExitFullscreen;
        if (exitFn) { try { exitFn.call(document); } catch (e) {} }
        return;
      }
      function enterFs() {
        if (document.fullscreenElement || document.webkitFullscreenElement) return;
        if (!muxEl) return;
        var req = muxEl.requestFullscreen || muxEl.webkitRequestFullscreen || muxEl.webkitEnterFullscreen;
        if (req) { try { req.call(muxEl); } catch (e) {} }
      }
      // First F with no player: mount + play, then fullscreen as soon as the
      // player is ready (canplay) — mux-player rejects requestFullscreen until
      // it has connected and loaded metadata. We also try immediately in case
      // it's already ready.
      if (!muxEl && view === 'cf') {
        cfPlayActive();
        if (muxEl) muxEl.addEventListener('canplay', enterFs, { once: true });
      }
      enterFs();
    }
    var wheelTimer = null, wheelAccum = 0;
    window.addEventListener('keydown', function(e){
      if (isTypingTarget(e.target)) return;
      if (view !== 'cf' && view !== 'stack') return;
      if (e.code === 'Space' || e.key === ' ') {
        e.preventDefault();
        togglePlayActive();
        return;
      }
      if (e.key === 'f' || e.key === 'F') {
        e.preventDefault();
        fullscreenActive();
        return;
      }
      if (view === 'cf') {
        if (e.key === 'ArrowLeft') cfGoTo(current - 1);
        if (e.key === 'ArrowRight') cfGoTo(current + 1);
      } else if (view === 'stack') {
        if (e.key === 'ArrowDown') stkGoTo(current + 1);
        if (e.key === 'ArrowUp') stkGoTo(current - 1);
      }
    });
    window.addEventListener('wheel', function(e){
      if (view !== 'cf') return;
      if (Math.abs(e.deltaX) < 25) return;
      wheelAccum += e.deltaX;
      if (Math.abs(wheelAccum) > 80 && !transitioning) {
        cfGoTo(current + (wheelAccum > 0 ? 1 : -1));
        wheelAccum = 0;
      }
      clearTimeout(wheelTimer);
      wheelTimer = setTimeout(function(){ wheelAccum = 0; }, 200);
    }, { passive: true });

    // Pointer drag for cover-flow nav (unified mouse + touch). The cf-stage
    // tracks the cursor in real time during the drag, then either snaps to the
    // adjacent card (if the drag passes threshold) or springs back to the
    // current card. The trailing click is suppressed so the active-card
    // play/pause handler doesn't also fire.
    var dragState = null;
    var dragMetaTarget = -1;          // index whose meta is currently shown during drag
    var DRAG_THRESHOLD = 50;          // px past which release navigates ±1
    var DRAG_SLOP = 5;                // px before we commit to a horizontal drag
    var TITLE_PREVIEW_VW = 0.30;      // viewport-width fraction (= 30vw) — geometric midpoint between adjacent cards
    function endDrag(ds, navDir) {
      var stage = ds.stage;
      // Match the cf-card transition (750ms ease-out-quart) so stage and cards
      // travel on the same curve and finish at the same time — no relative
      // motion, no perceived bounce.
      stage.style.transition = 'transform 750ms cubic-bezier(0.22, 1, 0.36, 1)';
      stage.style.transform = 'translate3d(0, 0, 0)';
      setTimeout(function(){ stage.style.transition = ''; stage.style.transform = ''; }, 800);
      if (navDir && view === 'cf' && !transitioning) cfGoTo(current + navDir);
    }
    document.addEventListener('pointerdown', function(e){
      if (view !== 'cf' || transitioning) return;
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      var stage = document.getElementById('cf-stage');
      if (!stage || !stage.contains(e.target)) return;
      // Don't start a drag in the bottom 10% of the active card while a player
      // is mounted — that strip is where mux-player's transport controls live.
      if (muxEl) {
        var activeCard = stage.querySelector('.cf-card.is-active');
        if (activeCard) {
          var rect = activeCard.getBoundingClientRect();
          if (e.clientY >= rect.bottom - rect.height * 0.10) return;
        }
      }
      dragState = {
        pid: e.pointerId, type: e.pointerType,
        startX: e.clientX, startY: e.clientY,
        dragging: false, lastDx: 0, stage: stage
      };
    });
    window.addEventListener('pointermove', function(e){
      if (!dragState || e.pointerId !== dragState.pid) return;
      var dx = e.clientX - dragState.startX;
      var dy = e.clientY - dragState.startY;
      if (!dragState.dragging) {
        if (Math.abs(dx) < DRAG_SLOP && Math.abs(dy) < DRAG_SLOP) return;
        if (Math.abs(dx) <= Math.abs(dy)) { dragState = null; return; }
        dragState.dragging = true;
        dragMetaTarget = current;
      }
      if (dragState.type === 'mouse') e.preventDefault();
      dragState.lastDx = dx;
      dragState.stage.style.transition = 'none';
      dragState.stage.style.transform = 'translate3d(' + dx + 'px, 0, 0)';
      // Live meta preview: swap the title once the drag crosses the geometric
      // midpoint between adjacent cards (~30vw — half the 60vw inter-card
      // spacing). Far enough that the next card visually dominates; not so
      // early that a tiny drag swaps the title.
      var titleThreshold = window.innerWidth * TITLE_PREVIEW_VW;
      var target = current;
      if (Math.abs(dx) >= titleThreshold) {
        target = Math.max(0, Math.min(assets.length - 1, current + (dx < 0 ? 1 : -1)));
      }
      if (target !== dragMetaTarget) {
        dragMetaTarget = target;
        cfShowMetaFor(target);
      }
    });
    window.addEventListener('pointerup', function(e){
      if (!dragState || e.pointerId !== dragState.pid) return;
      var ds = dragState; dragState = null;
      if (!ds.dragging) return;
      var dx = ds.lastDx;
      var navDir = Math.abs(dx) >= DRAG_THRESHOLD ? (dx < 0 ? 1 : -1) : 0;
      endDrag(ds, navDir);
      var blocker = function(ev){ ev.stopPropagation(); ev.preventDefault(); };
      window.addEventListener('click', blocker, { capture: true, once: true });
    });
    window.addEventListener('pointercancel', function(e){
      if (!dragState || e.pointerId !== dragState.pid) return;
      var ds = dragState; dragState = null;
      if (!ds.dragging) return;
      endDrag(ds, 0);
      if (dragMetaTarget !== current) { dragMetaTarget = current; cfShowMetaFor(current); }
    });

    // ── Stack view ──
    function renderStack() {
      var html = '<div class="stk-wrap view-stack" id="stk-wrap">';
      html += '  <div class="stk-meta-top" id="stk-meta-top"></div>';
      html += '  <div class="stk-featured" id="stk-featured">';
      html += '    <div class="stk-card" id="stk-card"></div>';
      html += '    <div class="play-glyph" id="stk-glyph"></div>';
      html += '  </div>';
      html += '  <div class="stk-thumbs" id="stk-thumbs">';
      assets.forEach(function(a, i) {
        html += '<div class="stk-thumb' + (i === current ? ' is-active' : '') + '" data-i="' + i + '" style="background-image:url(' + posterFor(a) + ')">';
        html += '  <div class="stk-thumb-label">' + escapeHtml(a.title || '') + '</div>';
        html += '</div>';
      });
      html += '  </div>';
      html += '</div>';
      html += '<div class="meta view-stack">';
      html += '  <div class="meta-title" id="stk-meta-title"></div>';
      html += '  <div class="meta-pos" id="stk-meta-pos"></div>';
      html += '</div>';
      return html;
    }

    function initStack() {
      document.querySelectorAll('#stk-thumbs .stk-thumb').forEach(function(item){
        item.addEventListener('click', function(){
          var i = Number(item.dataset.i);
          if (i !== current) stkGoTo(i);
        });
      });
      var featured = document.getElementById('stk-featured');
      var thumbs = document.getElementById('stk-thumbs');
      var sync = function(){ thumbs.style.height = featured.offsetHeight + 'px'; };
      sync();
      if (typeof ResizeObserver !== 'undefined') { new ResizeObserver(sync).observe(featured); }
      window.addEventListener('resize', sync);
      stkMountFeatured();
      stkUpdateMeta();
    }

    function stkGoTo(i) {
      i = Math.max(0, Math.min(assets.length - 1, i));
      if (i === current || transitioning) return;
      transitioning = true;
      var wrap = document.getElementById('stk-wrap');
      if (wrap) wrap.classList.add('shifting');
      var titleEl = document.getElementById('stk-meta-title');
      if (titleEl) titleEl.classList.add('fade');
      cleanupMode();
      document.querySelectorAll('#stk-thumbs .stk-thumb').forEach(function(el){
        el.classList.toggle('is-active', Number(el.dataset.i) === i);
      });
      current = i;
      setTimeout(function(){
        stkMountFeatured();
        stkUpdateMeta();
        if (wrap) wrap.classList.remove('shifting');
        if (titleEl) titleEl.classList.remove('fade');
        transitioning = false;
      }, 600);
    }

    function stkMountFeatured() {
      var card = document.getElementById('stk-card');
      if (!card) return;
      var a = assets[current];
      card.style.backgroundImage = 'url(' + posterFor(a) + ')';
      muxEl = makeMux(a.mux_playback_id);
      card.appendChild(muxEl);
      attachGlyph(muxEl, document.getElementById('stk-glyph'));
      var g = document.getElementById('stk-glyph');
      if (g) g.classList.remove('hidden');
    }

    function stkUpdateMeta() {
      var a = assets[current];
      var titleEl = document.getElementById('stk-meta-title');
      var posEl = document.getElementById('stk-meta-pos');
      var topEl = document.getElementById('stk-meta-top');
      if (titleEl) titleEl.textContent = a.title || '';
      if (posEl) posEl.textContent = (current + 1) + ' / ' + assets.length;
      if (topEl) topEl.textContent = fmtDuration(a.duration_seconds);
    }

    // ── Shared ──
    function makeMux(playbackId) {
      var el = document.createElement('mux-player');
      el.setAttribute('playback-id', playbackId);
      el.setAttribute('stream-type', 'on-demand');
      el.setAttribute('accent-color', '#dc2828');
      el.setAttribute('disable-cookies', '');
      el.style.position = 'absolute';
      el.style.inset = '0';
      el.style.width = '100%';
      el.style.height = '100%';
      el.style.setProperty('--seek-backward-button', 'none');
      el.style.setProperty('--seek-forward-button', 'none');
      el.style.setProperty('--captions-button', 'none');
      el.style.setProperty('--airplay-button', 'none');
      el.style.setProperty('--cast-button', 'none');
      el.style.setProperty('--pip-button', 'none');
      return el;
    }

    function attachGlyph(playerEl, glyphEl) {
      if (!playerEl || !glyphEl) return;
      playerEl.addEventListener('play', function(){ glyphEl.classList.add('hidden'); });
      playerEl.addEventListener('pause', function(){ glyphEl.classList.remove('hidden'); });
      playerEl.addEventListener('ended', function(){ glyphEl.classList.remove('hidden'); });
    }

    load();

    // ── Scheduler popover ──
    (function initScheduler(){
      var fab = document.getElementById('sched-fab');
      var overlay = document.getElementById('sched-overlay');
      var monthEl = document.getElementById('sched-month');
      var weekdaysEl = document.getElementById('sched-weekdays');
      var daysEl = document.getElementById('sched-days');
      var timesEl = document.getElementById('sched-times');
      var formEl = document.getElementById('sched-form');
      var prevBtn = document.getElementById('sched-prev');
      var nextBtn = document.getElementById('sched-next');
      var nameEl = document.getElementById('sched-name');
      var emailEl = document.getElementById('sched-email');
      var confirmBtn = document.getElementById('sched-confirm');
      var errorEl = document.getElementById('sched-error');
      var bodyEl = document.getElementById('sched-body');

      var viewMonth = new Date();
      viewMonth.setDate(1);
      var selectedDay = null;   // YYYY-MM-DD string
      var selectedSlot = null;  // { start, end }
      var availabilityCache = {}; // dateStr -> slots[]

      // Weekday header
      ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(function(w){
        var el = document.createElement('div');
        el.className = 'sched-weekday';
        el.textContent = w.slice(0, 1);
        weekdaysEl.appendChild(el);
      });

      function fmtMonth(d) {
        return d.toLocaleString('en-US', { month: 'long', year: 'numeric' }).toUpperCase();
      }
      function dateKey(d) {
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      }

      function renderMonth() {
        monthEl.textContent = fmtMonth(viewMonth);
        daysEl.innerHTML = '';
        var firstDow = viewMonth.getDay();
        var year = viewMonth.getFullYear();
        var month = viewMonth.getMonth();
        var daysInMonth = new Date(year, month + 1, 0).getDate();
        var today = new Date(); today.setHours(0,0,0,0);

        // Leading blanks
        for (var i = 0; i < firstDow; i++) {
          var blank = document.createElement('div');
          blank.className = 'sched-day';
          daysEl.appendChild(blank);
        }
        for (var d = 1; d <= daysInMonth; d++) {
          var dt = new Date(year, month, d);
          var k = dateKey(dt);
          var btn = document.createElement('button');
          btn.className = 'sched-day';
          btn.textContent = String(d);
          btn.dataset.date = k;
          var dow = dt.getDay();
          var isWeekend = dow === 0 || dow === 6;
          var isPast = dt < today;
          if (isPast) btn.classList.add('past');
          else if (!isWeekend) btn.classList.add('available');
          if (dt.getTime() === today.getTime()) btn.classList.add('today');
          if (k === selectedDay) btn.classList.add('selected');
          btn.addEventListener('click', function(){
            if (this.classList.contains('available')) selectDay(this.dataset.date);
          });
          daysEl.appendChild(btn);
        }

        // Disable prev if it would land before today's month
        var thisMonth = new Date(); thisMonth.setDate(1); thisMonth.setHours(0,0,0,0);
        prevBtn.disabled = (viewMonth.getFullYear() === thisMonth.getFullYear() && viewMonth.getMonth() === thisMonth.getMonth());
      }

      async function selectDay(dateStr) {
        selectedDay = dateStr;
        selectedSlot = null;
        renderMonth();
        timesEl.classList.add('visible');
        formEl.classList.remove('visible');
        timesEl.innerHTML = '<div class="sched-times-empty">Loading.</div>';
        var slots = availabilityCache[dateStr];
        if (!slots) {
          try {
            var r = await fetch('/api/scheduler/availability?date=' + encodeURIComponent(dateStr));
            var data = await r.json();
            if (!r.ok) throw new Error(data.error || ('HTTP ' + r.status));
            slots = data.slots || [];
            availabilityCache[dateStr] = slots;
          } catch (e) {
            timesEl.innerHTML = '<div class="sched-times-empty">' + escapeHtml(e.message) + '</div>';
            return;
          }
        }
        if (!slots.length) {
          timesEl.innerHTML = '<div class="sched-times-empty">No availability that day.</div>';
          return;
        }
        timesEl.innerHTML = '';
        slots.forEach(function(s){
          var btn = document.createElement('button');
          btn.className = 'sched-time';
          btn.textContent = formatSlotTime(s.start);
          btn.addEventListener('click', function(){
            timesEl.querySelectorAll('.sched-time').forEach(function(b){ b.classList.remove('selected'); });
            btn.classList.add('selected');
            selectedSlot = s;
            formEl.classList.add('visible');
            updateConfirmEnabled();
          });
          timesEl.appendChild(btn);
        });
      }

      function formatSlotTime(iso) {
        var d = new Date(iso);
        return d.toLocaleString('en-US', { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });
      }

      function updateConfirmEnabled() {
        var emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value || '');
        confirmBtn.disabled = !(selectedSlot && emailOk);
      }
      emailEl.addEventListener('input', updateConfirmEnabled);

      confirmBtn.addEventListener('click', async function(){
        if (!selectedSlot) return;
        confirmBtn.disabled = true;
        confirmBtn.textContent = 'Booking…';
        errorEl.textContent = '';
        try {
          var r = await fetch('/api/scheduler/book', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name: nameEl.value || null,
              email: emailEl.value,
              start: selectedSlot.start,
              end: selectedSlot.end,
              reel_slug: slug,
            }),
          });
          var data = await r.json();
          if (!r.ok) throw new Error(data.error || ('HTTP ' + r.status));
          renderSuccess(data, selectedSlot);
        } catch (e) {
          errorEl.textContent = e.message || 'Could not book';
          confirmBtn.disabled = false;
          confirmBtn.textContent = 'Confirm booking';
        }
      });

      function renderSuccess(data, slot) {
        bodyEl.innerHTML =
          '<div class="sched-success">' +
            '<div class="sched-success-title">Booked.</div>' +
            '<div class="sched-success-msg">' +
              'Calendar invite sent to ' + escapeHtml(emailEl.value) + '.<br/>' +
              formatSlotTime(slot.start) + ' on ' +
              new Date(slot.start).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }) +
            '</div>' +
            (data.meet_link ? '<a href="' + escapeHtml(data.meet_link) + '" target="_blank" rel="noopener">Open Google Meet link</a>' : '') +
          '</div>';
      }

      prevBtn.addEventListener('click', function(){
        viewMonth.setMonth(viewMonth.getMonth() - 1);
        selectedDay = null; selectedSlot = null;
        timesEl.classList.remove('visible'); formEl.classList.remove('visible');
        renderMonth();
      });
      nextBtn.addEventListener('click', function(){
        viewMonth.setMonth(viewMonth.getMonth() + 1);
        selectedDay = null; selectedSlot = null;
        timesEl.classList.remove('visible'); formEl.classList.remove('visible');
        renderMonth();
      });

      function toggleScheduler() {
        var open = overlay.classList.toggle('open');
        fab.classList.toggle('open', open);
        if (open) renderMonth();
      }
      fab.addEventListener('click', toggleScheduler);

      document.addEventListener('click', function(e){
        // Inline footer trigger is rendered async by load() — delegate here.
        if (e.target.closest('#sched-inline')) { toggleScheduler(); return; }
        if (!overlay.classList.contains('open')) return;
        if (overlay.contains(e.target) || fab.contains(e.target)) return;
        overlay.classList.remove('open');
        fab.classList.remove('open');
      });
    })();
  </script>
</body>
</html>
