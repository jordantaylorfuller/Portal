<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>NIPC</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <link href="images/favicon.png" rel="shortcut icon" type="image/x-icon"/>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --reel-w: clamp(560px, 76vw, 1180px);
    }
    html, body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'DM Mono', monospace;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .header {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 22px 32px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 50;
      mix-blend-mode: difference;
    }
    .header-mark { font-size: 11px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: #fff; }
    .header-mark .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: rgb(220, 40, 40); margin-right: 10px; vertical-align: middle; }
    .header-meta { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: #fff; opacity: 0.6; }

    .hero {
      width: var(--reel-w);
      margin: 0 auto;
      padding: 110px 0 30px;
    }
    .hero-eyebrow { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 16px; }
    .hero-title { font-size: clamp(28px, 5vw, 56px); font-weight: 500; line-height: 1.05; letter-spacing: -0.01em; margin-bottom: 16px; }
    .hero-desc { font-size: 14px; font-weight: 300; line-height: 1.7; color: rgba(255,255,255,0.55); max-width: 560px; }

    /* ── Cover Flow Stage ── */
    .stage-wrap {
      perspective: 2200px;
      perspective-origin: 50% 45%;
      width: 100vw;
      height: 70vh;
      min-height: 480px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .stage {
      position: relative;
      transform-style: preserve-3d;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .floor {
      position: absolute;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
      width: min(92vw, 1100px);
      height: 60px;
      background: radial-gradient(ellipse at center, rgba(220,40,40,0.10), transparent 70%);
      filter: blur(10px);
      pointer-events: none;
    }

    .card {
      position: absolute;
      width: var(--reel-w);
      aspect-ratio: 16/9;
      will-change: transform, filter;
      opacity: 1;
      transition:
        transform 750ms cubic-bezier(0.22, 1, 0.36, 1),
        filter 600ms cubic-bezier(0.22, 1, 0.36, 1);
      transform-style: preserve-3d;
      cursor: pointer;
      box-shadow:
        0 30px 60px rgba(0,0,0,0.75),
        0 12px 24px rgba(0,0,0,0.5),
        0 0 0 1px rgba(255,255,255,0.04);
      background: #000 center/cover no-repeat;
      -webkit-box-reflect: below 8px linear-gradient(transparent 60%, rgba(0,0,0,0.35));
    }
    .card.is-active {
      box-shadow:
        0 50px 100px rgba(0,0,0,0.85),
        0 20px 40px rgba(0,0,0,0.6),
        0 0 0 1px rgba(255,255,255,0.06),
        0 0 80px rgba(220,40,40,0.15);
    }
    .card mux-player, .card .poster {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      background: center/cover no-repeat #000;
    }
    .card .poster::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0) 60%, rgba(0,0,0,0.4));
    }
    .card .play-glyph {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 56px; height: 56px;
      border: 1.5px solid rgba(255,255,255,0.9);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px);
      transition: transform 300ms ease, opacity 300ms ease;
      opacity: 0.9;
    }
    .card .play-glyph::after {
      content: '';
      width: 0; height: 0;
      border-left: 12px solid #fff;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      margin-left: 4px;
    }
    .card:hover .play-glyph { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
    .card.is-active .play-glyph { display: none; }

    /* Motion blur during navigation */
    .stage.shifting .card { filter: blur(var(--blur, 0px)) brightness(0.9); }
    .stage:not(.shifting) .card { filter: blur(var(--blur, 0px)); }

    /* ── Meta + nav ── */
    .meta {
      width: var(--reel-w);
      margin: 24px auto 0;
      padding: 0;
      display: flex; align-items: baseline; justify-content: space-between;
    }
    .meta-title {
      font-size: 16px; font-weight: 400; letter-spacing: 0.02em;
      transition: opacity 250ms ease;
    }
    .meta-title.fade { opacity: 0; }
    .meta-pos {
      font-variant-numeric: tabular-nums;
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    .nav {
      width: var(--reel-w);
      margin: 28px auto 0;
      padding: 0;
      display: flex; align-items: center; justify-content: center; gap: 24px;
    }
    .dots {
      display: flex; gap: 8px; align-items: center;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.18);
      transition: background 200ms ease, transform 200ms ease;
      cursor: pointer; border: none; padding: 0;
    }
    .dot.active { background: rgb(220, 40, 40); transform: scale(1.4); }
    .arrow {
      width: 36px; height: 36px;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent; color: rgba(255,255,255,0.7);
      cursor: pointer;
      transition: border-color 200ms ease, color 200ms ease, transform 200ms ease;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: inherit; font-size: 16px;
    }
    .arrow:hover { border-color: #fff; color: #fff; }
    .arrow:active { transform: scale(0.95); }
    .arrow:disabled { opacity: 0.2; cursor: not-allowed; }

    .footer {
      width: var(--reel-w);
      margin: 80px auto 0;
      padding: 32px 0 60px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; justify-content: space-between;
      font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    .empty, .loader {
      max-width: 720px; margin: 200px auto;
      padding: 0 32px; text-align: center;
    }
    .empty-title { font-size: 16px; margin-bottom: 12px; }
    .empty-msg { font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.6; }
    .loader { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.3); }

    /* ── Style picker (debug) ── */
    .style-picker {
      position: fixed; bottom: 24px; right: 24px; z-index: 60;
      display: flex; gap: 8px;
      font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
    }
    .style-picker a {
      padding: 6px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      transition: color 150ms, border-color 150ms;
    }
    .style-picker a:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
    .style-picker a.current { color: #fff; border-color: rgb(220,40,40); background: rgba(220,40,40,0.08); }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-mark"><span class="dot"></span>NIPC</div>
    <div class="header-meta" id="header-meta">Selected Work</div>
  </header>

  <main id="main">
    <div class="loader">Loading.</div>
  </main>

  <nav class="style-picker" id="style-picker">
    <a href="#" data-style="baseline">List</a>
    <a href="#" data-style="coverflow" class="current">Cover Flow</a>
    <a href="#" data-style="stack">Stack</a>
  </nav>

  <script>
    var slug = new URLSearchParams(location.search).get('s');
    var current = 0;
    var assets = [];
    var muxEl = null;
    var stageEl = null;
    var transitioning = false;

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){
        return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c];
      });
    }
    function thumbUrl(playbackId) {
      return 'https://image.mux.com/' + playbackId + '/thumbnail.jpg?width=1280&fit_mode=preserve';
    }
    function fmtDuration(seconds) {
      if (!seconds) return '';
      var s = Math.round(seconds);
      var m = Math.floor(s / 60);
      var r = s % 60;
      return m + ':' + (r < 10 ? '0' + r : r);
    }
    function renderEmpty(title, msg) {
      document.getElementById('main').innerHTML =
        '<div class="empty"><div class="empty-title">' + escapeHtml(title) + '</div>' +
        '<div class="empty-msg">' + escapeHtml(msg) + '</div></div>';
    }

    async function load() {
      if (!slug) return renderEmpty('Reel not found', 'This link is missing a reel identifier.');
      var res, data;
      try {
        res = await fetch('/api/reels/public?s=' + encodeURIComponent(slug));
        data = await res.json();
      } catch (e) { return renderEmpty('Connection error', 'Try refreshing the page.'); }
      if (res.status === 404 || !data.reel) return renderEmpty('Reel not found', 'This reel may have moved or been unpublished.');

      assets = data.assets || [];
      var reel = data.reel;
      document.title = 'NIPC | ' + reel.title;
      document.getElementById('header-meta').textContent = reel.title;

      var html = '';
      html += '<section class="hero">';
      html += '  <div class="hero-eyebrow">Selected Work</div>';
      html += '  <h1 class="hero-title">' + escapeHtml(reel.title) + '</h1>';
      if (reel.description) html += '<p class="hero-desc">' + escapeHtml(reel.description) + '</p>';
      html += '</section>';

      if (!assets.length) {
        html += '<div class="empty"><div class="empty-title">Coming soon</div><div class="empty-msg">Videos for this reel are still being prepared.</div></div>';
        document.getElementById('main').innerHTML = html;
        return;
      }

      html += '<div class="stage-wrap">';
      html += '  <div class="floor"></div>';
      html += '  <div class="stage" id="stage">';
      assets.forEach(function(a, i) {
        html += '<div class="card" data-i="' + i + '" style="background-image:url(' + thumbUrl(a.mux_playback_id) + ')">';
        html += '  <div class="poster" style="background-image:url(' + thumbUrl(a.mux_playback_id) + ')"></div>';
        html += '  <div class="play-glyph"></div>';
        html += '</div>';
      });
      html += '  </div>';
      html += '</div>';

      html += '<div class="meta">';
      html += '  <div class="meta-title" id="meta-title"></div>';
      html += '  <div class="meta-pos" id="meta-pos"></div>';
      html += '</div>';
      html += '<div class="nav">';
      html += '  <button class="arrow" id="prev" aria-label="Previous">&larr;</button>';
      html += '  <div class="dots" id="dots"></div>';
      html += '  <button class="arrow" id="next" aria-label="Next">&rarr;</button>';
      html += '</div>';
      html += '<footer class="footer"><div>NIPC &nbsp;//&nbsp; New International Picture Company</div><div>New York</div></footer>';

      document.getElementById('main').innerHTML = html;

      stageEl = document.getElementById('stage');
      var dotsEl = document.getElementById('dots');
      var dotsHtml = '';
      assets.forEach(function(_, i){ dotsHtml += '<button class="dot" data-i="' + i + '"></button>'; });
      dotsEl.innerHTML = dotsHtml;

      stageEl.querySelectorAll('.card').forEach(function(card){
        card.addEventListener('click', function(){
          var i = Number(card.dataset.i);
          if (i !== current) goTo(i);
        });
      });
      dotsEl.querySelectorAll('.dot').forEach(function(d){
        d.addEventListener('click', function(){ goTo(Number(d.dataset.i)); });
      });
      document.getElementById('prev').addEventListener('click', function(){ goTo(current - 1); });
      document.getElementById('next').addEventListener('click', function(){ goTo(current + 1); });
      window.addEventListener('keydown', function(e){
        if (e.key === 'ArrowLeft') goTo(current - 1);
        if (e.key === 'ArrowRight') goTo(current + 1);
      });

      // Trackpad / wheel horizontal swipe
      var wheelTimer = null, wheelAccum = 0;
      window.addEventListener('wheel', function(e){
        if (Math.abs(e.deltaX) < 25) return;
        wheelAccum += e.deltaX;
        if (Math.abs(wheelAccum) > 80 && !transitioning) {
          goTo(current + (wheelAccum > 0 ? 1 : -1));
          wheelAccum = 0;
        }
        clearTimeout(wheelTimer);
        wheelTimer = setTimeout(function(){ wheelAccum = 0; }, 200);
      }, { passive: true });

      layout();
      mountActiveMux();
      updateMeta();
    }

    function clamp(i) { return Math.max(0, Math.min(assets.length - 1, i)); }

    function goTo(i) {
      i = clamp(i);
      if (i === current || transitioning) return;
      transitioning = true;
      stageEl.classList.add('shifting');
      // Crossfade title
      var titleEl = document.getElementById('meta-title');
      titleEl.classList.add('fade');
      // Unmount old mux player at the start of transition
      unmountMux();
      current = i;
      layout();
      // After motion settles, mount mux on new active card and clear blur
      setTimeout(function(){
        stageEl.classList.remove('shifting');
        mountActiveMux();
        updateMeta();
        titleEl.classList.remove('fade');
        transitioning = false;
      }, 700);
      document.getElementById('prev').disabled = (current === 0);
      document.getElementById('next').disabled = (current === assets.length - 1);
    }

    function layout() {
      var cards = stageEl.querySelectorAll('.card');
      cards.forEach(function(card, i){
        var offset = i - current;
        var abs = Math.abs(offset);
        var sign = Math.sign(offset);

        if (abs === 0) {
          card.style.setProperty('--blur', '0px');
          card.style.transform = 'translateX(0) translateZ(0) rotateY(0deg) scale(1)';
          card.style.zIndex = 100;
          card.classList.add('is-active');
        } else {
          // Cover Flow: siblings rotated, partially visible past the active card.
          // Active half-width is 38vw at the 76vw clamp; siblings center at 60-65vw so they poke past.
          var x = sign * (60 + (abs - 1) * 14); // viewport-relative
          var z = -180 - (abs - 1) * 90;
          var rot = sign * -50;
          var scale = Math.max(0.78, 1 - abs * 0.07);
          card.style.transform = 'translateX(' + x + 'vw) translateZ(' + z + 'px) rotateY(' + rot + 'deg) scale(' + scale + ')';
          card.style.zIndex = String(50 - abs);
          card.style.setProperty('--blur', Math.min(2, abs * 0.6) + 'px');
          card.classList.remove('is-active');
        }
      });
      // Update dots
      var dotEls = document.querySelectorAll('#dots .dot');
      dotEls.forEach(function(d, i){ d.classList.toggle('active', i === current); });
      // Disable nav at edges
      var prev = document.getElementById('prev'), next = document.getElementById('next');
      if (prev) prev.disabled = (current === 0);
      if (next) next.disabled = (current === assets.length - 1);
    }

    function unmountMux() {
      if (muxEl) {
        try { muxEl.pause(); } catch (e) {}
        muxEl.remove();
        muxEl = null;
      }
    }

    function mountActiveMux() {
      var card = stageEl.querySelector('.card[data-i="' + current + '"]');
      if (!card) return;
      var a = assets[current];
      muxEl = document.createElement('mux-player');
      muxEl.setAttribute('playback-id', a.mux_playback_id);
      muxEl.setAttribute('stream-type', 'on-demand');
      muxEl.setAttribute('accent-color', '#dc2828');
      muxEl.setAttribute('disable-cookies', '');
      muxEl.style.position = 'absolute';
      muxEl.style.inset = '0';
      muxEl.style.width = '100%';
      muxEl.style.height = '100%';
      muxEl.style.setProperty('--seek-backward-button', 'none');
      muxEl.style.setProperty('--seek-forward-button', 'none');
      muxEl.style.setProperty('--captions-button', 'none');
      muxEl.style.setProperty('--airplay-button', 'none');
      muxEl.style.setProperty('--cast-button', 'none');
      muxEl.style.setProperty('--pip-button', 'none');
      card.appendChild(muxEl);
    }

    function updateMeta() {
      var a = assets[current];
      var titleEl = document.getElementById('meta-title');
      var posEl = document.getElementById('meta-pos');
      var dur = fmtDuration(a.duration_seconds);
      titleEl.textContent = a.title || '';
      posEl.textContent = (current + 1) + ' / ' + assets.length + (dur ? '  ·  ' + dur : '');
    }

    // Style picker links
    document.getElementById('style-picker').addEventListener('click', function(e){
      var a = e.target.closest('a[data-style]');
      if (!a) return;
      e.preventDefault();
      var style = a.dataset.style;
      var url = (style === 'baseline' ? '/reel.html' : '/reel-' + style + '.html') + '?s=' + encodeURIComponent(slug);
      location.href = url;
    });

    load();
  </script>
</body>
</html>
